<!DOCTYPE html>
<html lang="en">
<head>
  <script>
  window["GD_OPTIONS"] = {
    "gameId": "28568f7e75d347f089926deea0708514",
    "onEvent": function(event) {
      switch(event.name) {
        case "SDK_GAME_START":
          // Ad finished - resume game
          if (window._gdGamePaused) {
            window._gdGamePaused = false;
            if (window._gdResumeGame) window._gdResumeGame();
          }
          break;
        case "SDK_GAME_PAUSE":
          // Ad starting - pause game
          window._gdGamePaused = true;
          if (window._gdPauseGame) window._gdPauseGame();
          break;
      }
    }
  };
  (function(d,s,id){
    var js, fjs = d.getElementsByTagName(s)[0];
    if(d.getElementById(id)) return;
    js = d.createElement(s);
    js.id = id;
    js.src = 'https://html5.api.gamedistribution.com/main.min.js';
    fjs.parentNode.insertBefore(js,fjs);
  }(document,'script','gamedistributionjssdk'));

  function showAd(onComplete) {
    if (typeof gdsdk !== 'undefined' && typeof gdsdk.showAd !== 'undefined') {
      window._gdResumeGame = onComplete;
      gdsdk.showAd();
    } else {
      if (onComplete) onComplete();
    }
  }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Neon Dash: Shape Shift</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      font-family: 'Orbitron', monospace;
      touch-action: none;
      user-select: none;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }

    @keyframes shake {
      0%   { transform: translate(0, 0); }
      10%  { transform: translate(-8px, -6px); }
      20%  { transform: translate(8px, 6px); }
      30%  { transform: translate(-6px, 4px); }
      40%  { transform: translate(6px, -4px); }
      50%  { transform: translate(-4px, 6px); }
      60%  { transform: translate(4px, -6px); }
      70%  { transform: translate(-8px, 2px); }
      80%  { transform: translate(8px, -2px); }
      90%  { transform: translate(-4px, 4px); }
      100% { transform: translate(0, 0); }
    }

    .shake {
      animation: shake 0.4s ease-out;
    }

    #wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c"></canvas>
  </div>

  <script>
  (function() {
    'use strict';

    /* ─── Canvas Setup ─────────────────────────────────────────────── */
    const wrap = document.getElementById('wrap');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let W, H;
    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    /* ─── Constants ────────────────────────────────────────────────── */
    const SHAPES       = ['circle', 'triangle', 'square'];
    const SHAPE_COLORS = { circle: '#00f5ff', triangle: '#ff00ff', square: '#aaff00' };
    const SHAPE_GLOW   = { circle: '#00aaff', triangle: '#cc00ff', square: '#88ff00' };
    const BG           = '#0a0a1a';
    const WALL_COLOR   = '#1a0a3a';
    const WALL_EDGE    = '#8800ff';
    const PLAYER_X_RATIO = 0.22;
    const HOLE_SIZE    = 130;
    const WALL_W       = 70;
    const BASE_SPEED   = 4.5;
    const SPEED_INC    = 0.5;
    const WALLS_PER_LEVEL = 10;
    const COMBO_THRESHOLD = 5;

    /* ─── State ────────────────────────────────────────────────────── */
    let state = 'start'; // 'start' | 'playing' | 'dead'
    let score, best, combo, shapeIdx, wallsCleared, level;
    let playerY, playerFlash, playerFlashColor;
    let shakeUntil = 0;
    let continueUsed = false;
    let walls = [];
    let particles = [];
    let nextWallTimer = 0;
    let wallInterval = 0;
    let frameCount = 0;
    let lastTime = 0;
    let animId;
    let comboDisplayUntil = 0;

    try { best = parseInt(localStorage.getItem('neonDashBest')) || 0; }
    catch(e) { best = 0; }

    // GD SDK pause/resume hooks
    window._gdPauseGame = function() {
      cancelAnimationFrame(animId);
    };
    window._gdResumeGame = function() {
      lastTime = performance.now();
      animId = requestAnimationFrame(loop);
    };

    /* ─── Init / Reset ─────────────────────────────────────────────── */
    function initGame() {
      score          = 0;
      combo          = 0;
      shapeIdx       = 0;
      wallsCleared   = 0;
      level          = 1;
      playerY        = H / 2;
      playerFlash    = 0;
      playerFlashColor = SHAPE_COLORS.circle;
      walls          = [];
      particles      = [];
      nextWallTimer  = 0;
      wallInterval   = 80;
      frameCount     = 0;
      continueUsed   = false;
      comboDisplayUntil = 0;
      generateWall();
    }

    /* ─── Wall Generation ──────────────────────────────────────────── */
    function randomShape() { return SHAPES[Math.floor(Math.random() * 3)]; }

    function generateWall() {
      const holeY = H / 2;
      const shape = randomShape();
      walls.push({
        x: W + WALL_W,
        holeShape: shape,
        holeY: holeY,
        holeSize: HOLE_SIZE,
        passed: false,
        speed: BASE_SPEED + (level - 1) * SPEED_INC,
        pulse: 0,
      });
    }

    function getNextWall() {
      for (let w of walls) if (!w.passed) return w;
      return null;
    }

    /* ─── Player Geometry ──────────────────────────────────────────── */
    function playerShape() { return SHAPES[shapeIdx]; }
    function playerColor() { return SHAPE_COLORS[playerShape()]; }
    function playerGlow()  { return SHAPE_GLOW[playerShape()]; }

    /* ─── Draw Helpers ─────────────────────────────────────────────── */
    function setGlow(color, blur) {
      ctx.shadowColor = color;
      ctx.shadowBlur  = blur;
    }
    function clearGlow() {
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur  = 0;
    }

    function drawCircle(x, y, r, fill, glowColor, glowBlur) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      setGlow(glowColor, glowBlur);
      ctx.fillStyle = fill;
      ctx.fill();
      clearGlow();
    }

    function drawTriangle(x, y, size, fill, glowColor, glowBlur) {
      const h = size * 0.866;
      ctx.beginPath();
      ctx.moveTo(x, y - h * 0.66);
      ctx.lineTo(x + size * 0.5, y + h * 0.34);
      ctx.lineTo(x - size * 0.5, y + h * 0.34);
      ctx.closePath();
      setGlow(glowColor, glowBlur);
      ctx.fillStyle = fill;
      ctx.fill();
      clearGlow();
    }

    function drawSquare(x, y, size, fill, glowColor, glowBlur) {
      const h = size * 0.8;
      ctx.beginPath();
      ctx.roundRect(x - h / 2, y - h / 2, h, h, 8);
      setGlow(glowColor, glowBlur);
      ctx.fillStyle = fill;
      ctx.fill();
      clearGlow();
    }

    function drawShape(shape, x, y, size, fill, glowColor, glowBlur) {
      if      (shape === 'circle')   drawCircle(x, y, size / 2, fill, glowColor, glowBlur);
      else if (shape === 'triangle') drawTriangle(x, y, size, fill, glowColor, glowBlur);
      else                           drawSquare(x, y, size, fill, glowColor, glowBlur);
    }

    /* ─── Draw Wall ────────────────────────────────────────────────── */
    function drawWall(w) {
      const x    = w.x;
      const hy   = w.holeY;
      const hs   = w.holeSize;
      const ww   = WALL_W;
      const dist = x - W * PLAYER_X_RATIO;
      const proximity = Math.max(0, 1 - dist / (W * 0.6));
      const pulse = 1 + proximity * 0.05 * Math.sin(frameCount * 0.3);

      ctx.save();
      ctx.translate(x + ww / 2, hy);
      ctx.scale(pulse, 1);
      ctx.translate(-(x + ww / 2), -hy);

      // Draw wall using compositing to cut hole
      const offC = document.createElement('canvas');
      offC.width  = W;
      offC.height = H;
      const offCtx = offC.getContext('2d');

      // Fill wall
      offCtx.fillStyle = WALL_COLOR;
      offCtx.fillRect(x, 0, ww, H);

      // Cut hole
      offCtx.globalCompositeOperation = 'destination-out';
      offCtx.fillStyle = 'rgba(0,0,0,1)';
      const shape = w.holeShape;
      if (shape === 'circle') {
        offCtx.beginPath();
        offCtx.arc(x + ww / 2, hy, hs / 2, 0, Math.PI * 2);
        offCtx.fill();
      } else if (shape === 'triangle') {
        const h = hs * 0.866;
        offCtx.beginPath();
        offCtx.moveTo(x + ww / 2, hy - h * 0.66);
        offCtx.lineTo(x + ww / 2 + hs * 0.5, hy + h * 0.34);
        offCtx.lineTo(x + ww / 2 - hs * 0.5, hy + h * 0.34);
        offCtx.closePath();
        offCtx.fill();
      } else {
        const sq = hs * 0.8;
        offCtx.beginPath();
        offCtx.roundRect(x + ww / 2 - sq / 2, hy - sq / 2, sq, sq, 8);
        offCtx.fill();
      }

      // Draw wall onto main canvas
      setGlow(WALL_EDGE, 25 + proximity * 20);
      ctx.drawImage(offC, 0, 0);
      clearGlow();

      // Edge glow lines
      ctx.strokeStyle = WALL_EDGE;
      ctx.lineWidth   = 3;
      setGlow(WALL_EDGE, 20);
      ctx.strokeRect(x, 0, ww, H);
      clearGlow();

      // Hole outline (shape indicator)
      const col = SHAPE_COLORS[shape];
      ctx.strokeStyle = col;
      ctx.lineWidth = 3;
      setGlow(col, 18);
      ctx.beginPath();
      if (shape === 'circle') {
        ctx.arc(x + ww / 2, hy, hs / 2, 0, Math.PI * 2);
      } else if (shape === 'triangle') {
        const h2 = hs * 0.866;
        ctx.moveTo(x + ww / 2, hy - h2 * 0.66);
        ctx.lineTo(x + ww / 2 + hs * 0.5, hy + h2 * 0.34);
        ctx.lineTo(x + ww / 2 - hs * 0.5, hy + h2 * 0.34);
        ctx.closePath();
      } else {
        const sq = hs * 0.8;
        ctx.roundRect(x + ww / 2 - sq / 2, hy - sq / 2, sq, sq, 8);
      }
      ctx.stroke();
      clearGlow();

      ctx.restore();
    }

    /* ─── Draw Player ──────────────────────────────────────────────── */
    function drawPlayer() {
      const x    = W * PLAYER_X_RATIO;
      const y    = playerY;
      const size = 60;
      const shape = playerShape();
      let col   = playerColor();
      let glow  = playerGlow();
      let glowBlur = 30;

      if (playerFlash > 0) {
        const t = playerFlash;
        if (t > 0.5) {
          col = '#ffffff';
          glow = playerFlashColor;
          glowBlur = 60;
        }
        playerFlash = Math.max(0, playerFlash - 0.04);
      }

      // Idle pulse
      const pulse = 1 + 0.04 * Math.sin(frameCount * 0.08);

      ctx.save();
      ctx.translate(x, y);
      ctx.scale(pulse, pulse);
      ctx.translate(-x, -y);

      // Trail
      for (let i = 4; i >= 1; i--) {
        const alpha = i / 8;
        ctx.globalAlpha = alpha;
        drawShape(shape, x - i * 12, y, size * (1 - i * 0.05), col, glow, 10);
      }
      ctx.globalAlpha = 1;

      // Main shape
      drawShape(shape, x, y, size, col, glow, glowBlur);

      ctx.restore();
    }

    /* ─── Particles ────────────────────────────────────────────────── */
    function spawnParticles(x, y, color, count, speed) {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
        const spd   = (speed + Math.random() * speed) * (0.5 + Math.random());
        particles.push({
          x, y,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          life: 1,
          decay: 0.02 + Math.random() * 0.03,
          size: 3 + Math.random() * 5,
          color,
          glow: color,
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x    += p.vx;
        p.y    += p.vy;
        p.vy   += 0.12;
        p.vx   *= 0.97;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = p.life;
        setGlow(p.glow, 15);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
        clearGlow();
      }
      ctx.globalAlpha = 1;
    }

    /* ─── Collision ────────────────────────────────────────────────── */
    function checkCollisions() {
      const px = W * PLAYER_X_RATIO;
      for (let w of walls) {
        if (w.passed) continue;
        const wallCenter = w.x + WALL_W / 2;
        if (Math.abs(wallCenter - px) < 30) {
          w.passed = true;
          if (playerShape() === w.holeShape) {
            onSuccess(px, playerY);
          } else {
            onFail(px, playerY);
          }
          break;
        }
      }
    }

    function onSuccess(x, y) {
      score++;
      wallsCleared++;
      combo++;
      if (combo >= COMBO_THRESHOLD) comboDisplayUntil = frameCount + 90;

      playerFlash      = 1;
      playerFlashColor = '#00ff88';
      spawnParticles(x, y, '#00ff88', 18, 6);
      spawnParticles(x, y, '#00ffff', 10, 4);

      // Level up?
      if (wallsCleared % WALLS_PER_LEVEL === 0) {
        level++;
        walls.forEach(w => { w.speed = BASE_SPEED + (level - 1) * SPEED_INC; });
      }

      if (score > best) {
        best = score;
        try { localStorage.setItem('neonDashBest', best); } catch(e) {}
      }
    }

    function onFail(x, y) {
      spawnParticles(x, y, '#ff2200', 25, 8);
      spawnParticles(x, y, '#ff8800', 15, 5);
      shakeUntil = Date.now() + 450;
      wrap.classList.remove('shake');
      void wrap.offsetWidth;
      wrap.classList.add('shake');
      state = 'dead';
    }

    /* ─── Input ────────────────────────────────────────────────────── */
    let inputHeld = false;

    function onTap(e) {
      e.preventDefault();

      if (state === 'start') {
        state = 'playing';
        initGame();
        return;
      }

      if (state === 'playing') {
        shapeIdx = (shapeIdx + 1) % 3;
        combo = 0; // shape change resets combo
        return;
      }

      if (state === 'dead') {
        // check buttons handled in draw click detection
      }
    }

    canvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      if (state === 'dead') {
        checkDeadButtons(e.clientX, e.clientY);
        return;
      }
      onTap(e);
    });

    // Dead screen button regions (set in draw)
    let btnPlayAgain = null, btnContinue = null;

    function checkDeadButtons(mx, my) {
      if (btnPlayAgain && inRect(mx, my, btnPlayAgain)) {
        // Mid-roll ad before play again
        showAd(function() {
          state = 'playing';
          initGame();
        });
      } else if (btnContinue && !continueUsed && inRect(mx, my, btnContinue)) {
        continueUsed = true;
        // Show rewarded ad for continue
        showAd(function() {
          walls = walls.filter(w => !w.passed || w.x > -WALL_W);
          state = 'playing';
          playerFlash = 0;
          particles = [];
        });
      } else if (state === 'dead') {
        // tap anywhere else still counts if no active buttons
      }
    }

    function inRect(mx, my, r) {
      return mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h;
    }

    /* ─── HUD Drawing ──────────────────────────────────────────────── */
    function drawHUD() {
      // Score
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'top';
      const scoreStr = String(score).padStart(5, '0');
      setGlow('#ffffff', 20);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 32px Orbitron, monospace';
      ctx.fillText(scoreStr, W / 2, 18);
      clearGlow();

      // Level indicator
      ctx.textAlign = 'left';
      ctx.font = '14px Orbitron, monospace';
      setGlow('#aa00ff', 12);
      ctx.fillStyle = '#cc44ff';
      ctx.fillText('LVL ' + level, 16, 18);
      clearGlow();

      // Speed bar
      const speedFill = Math.min((level - 1) / 10, 1);
      ctx.fillStyle = '#1a0a3a';
      ctx.fillRect(16, 38, 100, 8);
      const barGrad = ctx.createLinearGradient(16, 0, 116, 0);
      barGrad.addColorStop(0, '#8800ff');
      barGrad.addColorStop(1, '#ff00ff');
      ctx.fillStyle = barGrad;
      setGlow('#ff00ff', 10);
      ctx.fillRect(16, 38, 100 * speedFill, 8);
      clearGlow();
      ctx.strokeStyle = '#440088';
      ctx.lineWidth = 1;
      ctx.strokeRect(16, 38, 100, 8);

      // Next shape preview
      drawPreview();

      // Combo
      if (combo >= COMBO_THRESHOLD && frameCount < comboDisplayUntil) {
        const alpha = Math.min(1, (comboDisplayUntil - frameCount) / 30);
        ctx.globalAlpha = alpha;
        ctx.textAlign = 'center';
        ctx.font = 'bold 22px Orbitron, monospace';
        setGlow('#ffff00', 20);
        ctx.fillStyle = '#ffee00';
        ctx.fillText('× ' + combo + ' COMBO!', W / 2, 70);
        clearGlow();
        ctx.globalAlpha = 1;
      }
    }

    function drawPreview() {
      const nw = getNextWall();
      if (!nw) return;
      const px = W - 100;
      const py = 20;
      const size = 40;

      ctx.textAlign = 'right';
      ctx.font = '11px Orbitron, monospace';
      ctx.fillStyle = '#888';
      ctx.fillText('NEXT', W - 60, py - 2);

      const col  = SHAPE_COLORS[nw.holeShape];
      const glow = SHAPE_GLOW[nw.holeShape];
      drawShape(nw.holeShape, px, py + size / 2 + 10, size, col, glow, 20);
    }

    /* ─── Start Screen ─────────────────────────────────────────────── */
    function drawStart() {
      drawBackground();

      // Animated orb showcase
      const cx = W / 2;
      const cy = H * 0.38;
      const t  = frameCount * 0.01;
      const si = Math.floor(t) % 3;
      const shape = SHAPES[si];
      const col   = SHAPE_COLORS[shape];
      const glow  = SHAPE_GLOW[shape];
      drawShape(shape, cx, cy, 80, col, glow, 40);

      // Title
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      ctx.font = 'bold 52px Orbitron, monospace';
      setGlow('#00f5ff', 30);
      ctx.fillStyle = '#00f5ff';
      ctx.fillText('NEON DASH', W / 2, H * 0.56);
      clearGlow();

      ctx.font = 'bold 28px Orbitron, monospace';
      setGlow('#ff00ff', 20);
      ctx.fillStyle = '#ff00ff';
      ctx.fillText('SHAPE SHIFT', W / 2, H * 0.64);
      clearGlow();

      // Blink tap
      const blink = Math.sin(frameCount * 0.08) > 0;
      if (blink) {
        ctx.font = '18px Orbitron, monospace';
        setGlow('#ffffff', 15);
        ctx.fillStyle = '#cccccc';
        ctx.fillText('TAP TO START', W / 2, H * 0.77);
        clearGlow();
      }

      // Best
      ctx.font = '14px Orbitron, monospace';
      ctx.fillStyle = '#556677';
      ctx.fillText('BEST: ' + String(best).padStart(5, '0'), W / 2, H * 0.86);

      // Instructions
      ctx.font = '12px Orbitron, monospace';
      ctx.fillStyle = '#334455';
      ctx.fillText('TAP TO CYCLE SHAPE · MATCH THE WALL CUTOUT', W / 2, H * 0.92);

      // Shape legend
      const legendY = H * 0.93 + 20;
      const shapes2 = ['circle', 'triangle', 'square'];
      shapes2.forEach((s, i) => {
        const lx = W / 2 + (i - 1) * 90;
        drawShape(s, lx, legendY, 22, SHAPE_COLORS[s], SHAPE_GLOW[s], 10);
      });
    }

    /* ─── Game Screen ──────────────────────────────────────────────── */
    function drawGame() {
      drawBackground();

      // Grid lines (subtle)
      ctx.strokeStyle = 'rgba(0, 100, 200, 0.05)';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 60) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += 60) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      walls.forEach(drawWall);
      drawParticles();
      drawPlayer();
      drawHUD();
    }

    /* ─── Dead Screen ──────────────────────────────────────────────── */
    function drawDead() {
      drawBackground();
      walls.forEach(drawWall);
      drawParticles();

      // Dark overlay
      ctx.fillStyle = 'rgba(10,10,26,0.78)';
      ctx.fillRect(0, 0, W, H);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // GAME OVER
      ctx.font = 'bold 54px Orbitron, monospace';
      setGlow('#ff2200', 40);
      ctx.fillStyle = '#ff4422';
      ctx.fillText('GAME OVER', W / 2, H * 0.27);
      clearGlow();

      // Score
      ctx.font = 'bold 38px Orbitron, monospace';
      setGlow('#ffffff', 15);
      ctx.fillStyle = '#ffffff';
      ctx.fillText(String(score).padStart(5, '0'), W / 2, H * 0.4);
      clearGlow();

      ctx.font = '14px Orbitron, monospace';
      ctx.fillStyle = '#556677';
      ctx.fillText('BEST: ' + String(best).padStart(5, '0'), W / 2, H * 0.47);

      // Play Again button
      const bw = 240, bh = 56;
      const bx = W / 2 - bw / 2;
      const by1 = H * 0.56;

      drawButton(bx, by1, bw, bh, '#00f5ff', '#003366', 'PLAY AGAIN');
      btnPlayAgain = { x: bx, y: by1, w: bw, h: bh };

      // Continue button
      const by2 = H * 0.70;
      if (!continueUsed) {
        drawButton(bx, by2, bw, bh, '#ffcc00', '#332200', 'CONTINUE? (WATCH AD)');
        btnContinue = { x: bx, y: by2, w: bw, h: bh };
      } else {
        ctx.font = '12px Orbitron, monospace';
        ctx.fillStyle = '#334455';
        ctx.textAlign = 'center';
        ctx.fillText('CONTINUE USED', W / 2, by2 + bh / 2);
        btnContinue = null;
      }

      // Level reached
      ctx.font = '12px Orbitron, monospace';
      ctx.fillStyle = '#445566';
      ctx.textAlign = 'center';
      ctx.fillText('LEVEL ' + level + ' · SPEED ×' + level.toFixed(1), W / 2, H * 0.88);
    }

    function drawButton(x, y, w, h, color, bgColor, label) {
      // Border glow
      setGlow(color, 20);
      ctx.strokeStyle = color;
      ctx.lineWidth   = 2;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, 10);
      ctx.stroke();
      clearGlow();

      // Fill
      const grad = ctx.createLinearGradient(x, y, x, y + h);
      grad.addColorStop(0, bgColor);
      grad.addColorStop(1, '#0a0a1a');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, 10);
      ctx.fill();

      // Label
      ctx.font = 'bold 14px Orbitron, monospace';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      setGlow(color, 12);
      ctx.fillStyle = color;
      ctx.fillText(label, x + w / 2, y + h / 2);
      clearGlow();
    }

    /* ─── Background ───────────────────────────────────────────────── */
    function drawBackground() {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);

      // Subtle center glow
      const cg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.6);
      cg.addColorStop(0, 'rgba(30, 0, 80, 0.3)');
      cg.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = cg;
      ctx.fillRect(0, 0, W, H);
    }

    /* ─── Main Loop ────────────────────────────────────────────────── */
    function update(dt) {
      frameCount++;

      if (state !== 'playing') {
        updateParticles();
        return;
      }

      // Spawn walls
      nextWallTimer++;
      if (nextWallTimer >= wallInterval) {
        nextWallTimer = 0;
        // Slightly reduce interval as level rises
        wallInterval = Math.max(50, 80 - (level - 1) * 3);
        generateWall();
      }

      // Move walls
      const spd = BASE_SPEED + (level - 1) * SPEED_INC;
      for (let i = walls.length - 1; i >= 0; i--) {
        walls[i].x -= spd;
        if (walls[i].x < -WALL_W - 10) walls.splice(i, 1);
      }

      checkCollisions();
      updateParticles();
    }

    function loop(ts) {
      const dt = Math.min((ts - lastTime) / 16.67, 3);
      lastTime = ts;

      update(dt);

      if      (state === 'start')   drawStart();
      else if (state === 'playing') drawGame();
      else                          drawDead();

      animId = requestAnimationFrame(loop);
    }

    requestAnimationFrame(ts => { lastTime = ts; animId = requestAnimationFrame(loop); });

    /* ─── Start screen tap ─────────────────────────────────────────── */
    canvas.addEventListener('click', e => {
      if (state === 'start') {
        // Pre-roll ad before game starts
        showAd(function() {
          state = 'playing';
          initGame();
        });
        return;
      }
      if (state === 'dead') {
        checkDeadButtons(e.clientX, e.clientY);
        return;
      }
      if (state === 'playing') {
        shapeIdx = (shapeIdx + 1) % 3;
        combo = 0;
      }
    });

    // Keyboard: spacebar / arrow
    window.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        if (state === 'start') { showAd(function(){ state = 'playing'; initGame(); }); return; }
        if (state === 'playing') { shapeIdx = (shapeIdx + 1) % 3; combo = 0; }
        if (state === 'dead') { state = 'playing'; initGame(); }
      }
    });

  })();
  </script>
</body>
