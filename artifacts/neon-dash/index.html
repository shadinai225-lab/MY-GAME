<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Neon Dash: Shape Shift</title>
  <meta name="description" content="A hyper-casual neon browser game — cycle your shape to match the wall cutout!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a1a;
      overflow: hidden;
      font-family: 'Orbitron', monospace;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #wrap {
      position: fixed;
      inset: 0;
    }
    canvas { display: block; width: 100%; height: 100%; }

    @keyframes screenShake {
      0%   { transform: translate(0,0) rotate(0deg); }
      10%  { transform: translate(-12px,-7px) rotate(-0.7deg); }
      20%  { transform: translate(12px,8px) rotate(0.7deg); }
      30%  { transform: translate(-9px,6px) rotate(-0.5deg); }
      40%  { transform: translate(9px,-6px) rotate(0.5deg); }
      50%  { transform: translate(-7px,8px) rotate(-0.4deg); }
      60%  { transform: translate(7px,-8px) rotate(0.4deg); }
      70%  { transform: translate(-12px,4px) rotate(-0.2deg); }
      80%  { transform: translate(12px,-4px) rotate(0.2deg); }
      90%  { transform: translate(-6px,6px) rotate(-0.1deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    .shaking { animation: screenShake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
  </style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>
(function () {
  'use strict';

  /* ══════════════ CANVAS ══════════════ */
  const wrap   = document.getElementById('wrap');
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  let W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  /* ══════════════ CONSTANTS ══════════════ */
  const SHAPES     = ['circle', 'triangle', 'square'];
  const SCOL       = { circle: '#00f5ff', triangle: '#ff00ff', square: '#aaff00' };
  const SGLOW      = { circle: '#007aff', triangle: '#cc00cc', square: '#77cc00' };
  const BG         = '#0a0a1a';
  const PX_PCT     = 0.18;              // player x
  const WALL_W     = 70;
  const BASE_SPEED = 6.5;              // ↑ was 4.8
  const SPD_INC    = 0.95;            // ↑ was 0.55
  const WALLS_LVL  = 10;
  const COMBO_MIN  = 5;
  const IVBASE     = 70;               // wall spawn interval frames ↓ was 90
  const IVMIN      = 36;               // ↓ was 52
  // Hole size shrinks with level
  function holeSize() { return Math.max(82, 118 - (level - 1) * 4); }
  // Bob — player moves vertically on a sine wave
  const BOB_AMP    = 0.25;            // fraction of H
  const BOB_FREQ   = 0.048;           // radians/frame
  // Three vertical zones for wall holes
  const HOLE_ZONES = [0.28, 0.50, 0.72]; // fraction of H

  /* ══════════════ STATE ══════════════ */
  let state = 'start';
  let score = 0, best = 0, combo = 0, shapeIdx = 0;
  let wallsCleared = 0, level = 1;
  let playerY = 0;                    // computed each frame from sine
  let playerRot = 0;                  // shape rotation accumulator
  let playerFlash = 0, playerFlashCol = '#00ff88';
  let walls = [], particles = [], stars = [];
  let nextWallTimer = 0, wallInterval = IVBASE;
  let frameCount = 0, lastTime = 0;
  let continueUsed = false;
  let comboShowUntil = 0, successFlashUntil = 0;
  let btnPlay = null, btnContinue = null;

  try { best = parseInt(localStorage.getItem('nds_best')) || 0; } catch(_) {}

  /* ══════════════ STARS ══════════════ */
  function buildStars() {
    stars = [];
    for (let i = 0; i < 140; i++)
      stars.push({ x: Math.random() * W, y: Math.random(), r: Math.random() * 1.6 + 0.3,
                   spd: Math.random() * 0.5 + 0.1, a: Math.random() * 0.55 + 0.15 });
  }
  buildStars();

  /* ══════════════ INIT ══════════════ */
  function initGame() {
    score = combo = shapeIdx = wallsCleared = 0;
    level = 1; playerRot = 0; playerFlash = 0;
    playerFlashCol = SCOL.circle;
    walls = []; particles = [];
    nextWallTimer = 0; wallInterval = IVBASE;
    continueUsed = false; comboShowUntil = successFlashUntil = 0;
    frameCount = 0;
    spawnWall();
  }

  /* ══════════════ WALLS ══════════════ */
  function rndShape() { return SHAPES[Math.floor(Math.random() * 3)]; }

  function spawnWall() {
    const zoneIdx = Math.floor(Math.random() * 3);
    walls.push({
      x: W + WALL_W + 20,
      holeShape: rndShape(),
      holeZone: zoneIdx,           // 0=top 1=mid 2=bot
      holeRotation: 0,             // animated rotation of hole outline
      passed: false,
    });
  }

  function getHoleY(w) { return HOLE_ZONES[w.holeZone] * H; }

  function wallSpeed() { return BASE_SPEED + (level - 1) * SPD_INC; }

  function getNextUnpassed() {
    for (const w of walls) if (!w.passed) return w;
    return null;
  }

  /* ══════════════ DRAW HELPERS ══════════════ */
  function glow(c, b)  { ctx.shadowColor = c; ctx.shadowBlur = b; }
  function noGlow()    { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; }

  // Draw shape path centered at (x,y) with optional rotation (radians)
  function shapePath(shape, x, y, size, rot) {
    ctx.beginPath();
    if (rot) { ctx.save(); ctx.translate(x, y); ctx.rotate(rot); ctx.translate(-x, -y); }
    if (shape === 'circle') {
      ctx.arc(x, y, size / 2, 0, Math.PI * 2);
    } else if (shape === 'triangle') {
      const h = size * 0.866;
      ctx.moveTo(x,              y - h * 0.64);
      ctx.lineTo(x + size * 0.5, y + h * 0.36);
      ctx.lineTo(x - size * 0.5, y + h * 0.36);
      ctx.closePath();
    } else {
      const s = size * 0.78;
      ctx.roundRect(x - s/2, y - s/2, s, s, 10);
    }
    if (rot) ctx.restore();
  }

  function fillShape(shape, x, y, size, col, glowCol, glowBlur, rot) {
    shapePath(shape, x, y, size, rot);
    glow(glowCol || col, glowBlur || 0);
    ctx.fillStyle = col;
    ctx.fill();
    noGlow();
  }

  function strokeShape(shape, x, y, size, col, lw, glowCol, glowBlur, rot) {
    shapePath(shape, x, y, size, rot);
    glow(glowCol || col, glowBlur || 0);
    ctx.strokeStyle = col;
    ctx.lineWidth   = lw;
    ctx.stroke();
    noGlow();
  }

  /* ══════════════ WALL RENDERING ══════════════ */
  let _off = null, _offCtx = null;
  function ensureOff() {
    if (!_off || _off.width !== W || _off.height !== H) {
      _off = new OffscreenCanvas(W, H);
      _offCtx = _off.getContext('2d');
    }
  }

  function offShapePath(ox, shape, x, y, size) {
    ox.beginPath();
    if (shape === 'circle') {
      ox.arc(x, y, size / 2, 0, Math.PI * 2);
    } else if (shape === 'triangle') {
      const h = size * 0.866;
      ox.moveTo(x, y - h * 0.64);
      ox.lineTo(x + size * 0.5, y + h * 0.36);
      ox.lineTo(x - size * 0.5, y + h * 0.36);
      ox.closePath();
    } else {
      const s = size * 0.78;
      ox.roundRect(x - s/2, y - s/2, s, s, 10);
    }
  }

  function drawWall(w) {
    ensureOff();
    const ox  = _offCtx;
    const wx  = Math.round(w.x);
    const hy  = getHoleY(w);
    const hs  = holeSize();
    const cx  = wx + WALL_W / 2;
    const dist      = w.x - W * PX_PCT;
    const proximity = Math.max(0, 1 - dist / (W * 0.62));

    ox.clearRect(0, 0, W, H);
    ox.fillStyle = '#130825';
    ox.fillRect(wx, 0, WALL_W, H);

    // Cut hole (axis-aligned — the outline rotates separately)
    ox.globalCompositeOperation = 'destination-out';
    ox.fillStyle = 'black';
    offShapePath(ox, w.holeShape, cx, hy, hs);
    ox.fill();
    ox.globalCompositeOperation = 'source-over';

    glow('#7700cc', 18 + proximity * 26);
    ctx.drawImage(_off, 0, 0);
    noGlow();

    // Edge lines
    ctx.strokeStyle = '#5500aa';
    ctx.lineWidth   = 2;
    glow('#aa00ff', 12 + proximity * 10);
    ctx.strokeRect(wx + 0.5, 0, WALL_W - 1, H);
    noGlow();

    // Zone stripes on wall (top/mid/bot visual hint)
    for (let z = 0; z < 3; z++) {
      const zy = HOLE_ZONES[z] * H;
      ctx.strokeStyle = z === w.holeZone ? SCOL[w.holeShape] + '44' : '#ffffff08';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(wx, zy);
      ctx.lineTo(wx + WALL_W, zy);
      ctx.stroke();
    }

    // Rotating hole outline
    const rotSpd = w.holeShape === 'circle' ? 0 : (w.holeShape === 'triangle' ? 0.04 : 0.025);
    w.holeRotation += rotSpd;
    const col = SCOL[w.holeShape];
    strokeShape(w.holeShape, cx, hy, hs, col, 2.5, col, 18 + proximity * 16, w.holeRotation);

    // Approach pulse ring
    if (proximity > 0.35) {
      const pAmt = 1 + (proximity - 0.35) * 0.1 * Math.sin(frameCount * 0.28);
      ctx.save();
      ctx.translate(cx, hy); ctx.scale(pAmt, pAmt); ctx.translate(-cx, -hy);
      strokeShape(w.holeShape, cx, hy, hs, col, 1.5, col, 10, w.holeRotation);
      ctx.restore();
    }

    // Zone indicator dot on left edge of wall
    glow(col, 12);
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(wx + 5, hy, 4, 0, Math.PI * 2);
    ctx.fill();
    noGlow();
  }

  /* ══════════════ PLAYER ══════════════ */
  // Rotation speeds per shape
  const ROT_SPD = { circle: 0, triangle: 0.055, square: 0.035 };

  function drawPlayer() {
    const px    = W * PX_PCT;
    const py    = playerY;
    const shape = SHAPES[shapeIdx];
    let col     = SCOL[shape];
    let glowCol = SGLOW[shape];
    let glowAmt = 35;

    if (playerFlash > 0) {
      if (playerFlash > 0.5) { col = '#ffffff'; glowCol = playerFlashCol; glowAmt = 75; }
      playerFlash = Math.max(0, playerFlash - 0.048);
    }

    // Scale breathe
    const breathe = 1 + 0.04 * Math.sin(frameCount * 0.09);

    ctx.save();
    ctx.translate(px, py);
    ctx.scale(breathe, breathe);
    ctx.translate(-px, -py);

    // Motion trail — fades out behind, follows bob
    for (let i = 4; i >= 1; i--) {
      const trailY = py + Math.sin((frameCount - i * 3) * BOB_FREQ) * (H * BOB_AMP) - py +
                     Math.sin(frameCount * BOB_FREQ) * (H * BOB_AMP) * 0;
      // approximate trail Y offset
      const prevY = H/2 + Math.sin((frameCount - i * 4) * BOB_FREQ) * (H * BOB_AMP);
      ctx.globalAlpha = 0.1 * (5 - i);
      fillShape(shape, px - i * 13, prevY, 58 * (1 - i * 0.04), col, glowCol, 6, playerRot * (1 - i*0.15));
    }
    ctx.globalAlpha = 1;

    // Core glow ring
    ctx.beginPath();
    ctx.arc(px, py, 38, 0, Math.PI * 2);
    glow(glowCol, 24);
    ctx.strokeStyle = col + '33';
    ctx.lineWidth   = 10;
    ctx.stroke();
    noGlow();

    // Main shape (rotating)
    fillShape(shape, px, py, 62, col, glowCol, glowAmt, playerRot);
    fillShape(shape, px, py, 46, col + 'cc', glowCol, glowAmt * 0.5, playerRot);

    ctx.restore();
  }

  /* ══════════════ PARTICLES ══════════════ */
  function burst(x, y, c1, c2, n, spd) {
    for (let i = 0; i < n; i++) {
      const ang = (Math.PI * 2 * i / n) + Math.random() * 0.6 - 0.3;
      const s   = spd * (0.5 + Math.random() * 1.3);
      particles.push({
        x, y,
        vx: Math.cos(ang) * s, vy: Math.sin(ang) * s - 1.2,
        life: 1, decay: 0.016 + Math.random() * 0.03,
        size: 2.5 + Math.random() * 5,
        col: Math.random() > 0.4 ? c1 : c2,
        star: Math.random() > 0.65
      });
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.16; p.vx *= 0.96;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.pow(p.life, 0.55);
      glow(p.col, 14);
      ctx.fillStyle = p.col;
      ctx.beginPath();
      if (p.star) {
        const r1 = p.size * p.life, r2 = r1 * 0.38;
        for (let k = 0; k < 8; k++) {
          const a = (Math.PI / 4) * k;
          const r = k % 2 === 0 ? r1 : r2;
          k === 0 ? ctx.moveTo(p.x + r*Math.cos(a), p.y + r*Math.sin(a))
                  : ctx.lineTo(p.x + r*Math.cos(a), p.y + r*Math.sin(a));
        }
        ctx.closePath();
      } else {
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      }
      ctx.fill();
      noGlow();
    }
    ctx.globalAlpha = 1;
  }

  /* ══════════════ COLLISION ══════════════ */
  function checkCollisions() {
    const px = W * PX_PCT;
    for (const w of walls) {
      if (w.passed) continue;
      if (Math.abs((w.x + WALL_W / 2) - px) < 28) {
        w.passed = true;
        const hy     = getHoleY(w);
        const hs     = holeSize();
        const yMatch = Math.abs(playerY - hy) < hs * 0.42;
        const sMatch = SHAPES[shapeIdx] === w.holeShape;
        if (sMatch && yMatch) onSuccess(px, playerY);
        else                  onFail(px, playerY);
        break;
      }
    }
  }

  function onSuccess(x, y) {
    score++; wallsCleared++; combo++;
    if (combo >= COMBO_MIN) comboShowUntil = frameCount + 100;
    playerFlash = 1; playerFlashCol = '#00ff88';
    successFlashUntil = frameCount + 7;
    burst(x, y, '#00ff88', '#00ccff', 22, 7);
    burst(x + 30, y, '#aaffaa', '#ffffff', 8, 4);
    if (wallsCleared % WALLS_LVL === 0) level++;
    if (score > best) {
      best = score;
      try { localStorage.setItem('nds_best', best); } catch(_) {}
    }
  }

  function onFail(x, y) {
    burst(x, y, '#ff2200', '#ff8800', 32, 10);
    burst(x, y, '#ff5500', '#ffaa00', 16, 5);
    triggerShake();
    state = 'dead';
  }

  function triggerShake() {
    wrap.classList.remove('shaking');
    void wrap.offsetWidth;
    wrap.classList.add('shaking');
    wrap.addEventListener('animationend', () => wrap.classList.remove('shaking'), { once: true });
  }

  /* ══════════════ BACKGROUND ══════════════ */
  function drawBg() {
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);

    const spd = state === 'playing' ? wallSpeed() * 0.2 : 1;
    for (const s of stars) {
      s.x -= s.spd * spd;
      if (s.x < 0) s.x = W + 10;
      ctx.globalAlpha = s.a * (0.5 + 0.5 * Math.sin(frameCount * 0.025 + s.y * 12));
      ctx.fillStyle   = '#aaccff';
      ctx.fillRect(s.x, s.y * H, s.r, s.r);
    }
    ctx.globalAlpha = 1;

    ctx.strokeStyle = 'rgba(30,0,100,0.08)';
    ctx.lineWidth   = 1;
    for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  }

  /* ══════════════ HUD ══════════════ */
  function drawHUD() {
    if (frameCount < successFlashUntil) {
      ctx.fillStyle = 'rgba(0,255,100,0.07)';
      ctx.fillRect(0, 0, W, H);
    }

    // Score
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.font = 'bold 36px Orbitron, monospace';
    glow('#ffffff', 22); ctx.fillStyle = '#ffffff';
    ctx.fillText(String(score).padStart(5, '0'), W / 2, 14);
    noGlow();

    // Level
    ctx.textAlign = 'left'; ctx.font = '13px Orbitron, monospace';
    glow('#aa00ff', 10); ctx.fillStyle = '#cc44ff';
    ctx.fillText('LVL ' + level, 16, 14);
    noGlow();

    // Speed bar
    const fill = Math.min((level - 1) / 14, 1);
    ctx.fillStyle = 'rgba(30,0,60,0.7)';
    ctx.fillRect(14, 36, 110, 9);
    if (fill > 0) {
      const bar = ctx.createLinearGradient(14, 0, 124, 0);
      bar.addColorStop(0, '#6600cc'); bar.addColorStop(1, '#ff00ff');
      glow('#ff00ff', 8); ctx.fillStyle = bar;
      ctx.fillRect(14, 36, 110 * fill, 9);
      noGlow();
    }
    ctx.strokeStyle = '#330055'; ctx.lineWidth = 1;
    ctx.strokeRect(14.5, 36.5, 110, 9);
    ctx.font = '10px Orbitron, monospace'; ctx.fillStyle = '#553366';
    ctx.textAlign = 'left';
    ctx.fillText('SPD ×' + level.toFixed(1), 16, 50);

    drawPreview();
    drawZoneIndicator();

    // Combo
    if (combo >= COMBO_MIN && frameCount <= comboShowUntil) {
      const alpha = Math.min(1, (comboShowUntil - frameCount) / 25);
      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';
      ctx.font = 'bold 24px Orbitron, monospace';
      const t = frameCount * 0.15;
      const rc = `rgb(${~~(200+55*Math.sin(t))},${~~(200+55*Math.sin(t+2))},${~~(80+40*Math.sin(t+4))})`;
      glow(rc, 20); ctx.fillStyle = rc;
      ctx.fillText('×' + combo + '  COMBO!', W / 2, 66);
      noGlow(); ctx.globalAlpha = 1;
    }
  }

  function drawPreview() {
    const nw = getNextUnpassed();
    if (!nw) return;
    const px = W - 86, py = 14, sz = 38;
    const col = SCOL[nw.holeShape], glw = SGLOW[nw.holeShape];

    ctx.textAlign = 'right'; ctx.textBaseline = 'top';
    ctx.font = '10px Orbitron, monospace'; ctx.fillStyle = '#445566';
    ctx.fillText('NEXT', W - 48, py);

    // spinning preview
    const rot = nw.holeShape === 'circle' ? 0 : frameCount * (nw.holeShape === 'triangle' ? 0.04 : 0.025);
    fillShape(nw.holeShape, px, py + sz/2 + 12, sz, col, glw, 18, rot);
  }

  // Right-side vertical zone indicator
  function drawZoneIndicator() {
    const nw = getNextUnpassed();
    const barX  = W - 18;
    const barH  = H * 0.55;
    const barY0 = (H - barH) / 2;
    const barW  = 8;

    // Track background
    ctx.fillStyle = 'rgba(30,0,60,0.5)';
    ctx.beginPath(); ctx.roundRect(barX - barW/2, barY0, barW, barH, 4); ctx.fill();

    // Zone dots
    for (let z = 0; z < 3; z++) {
      const zy = barY0 + HOLE_ZONES[z] * barH;
      const col = (nw && nw.holeZone === z) ? SCOL[nw.holeShape] : '#334455';
      const r   = (nw && nw.holeZone === z) ? 5 : 3;
      glow(col, (nw && nw.holeZone === z) ? 10 : 0);
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(barX, zy, r, 0, Math.PI*2); ctx.fill();
      noGlow();
    }

    // Player dot (tracks current Y)
    const playerFrac = (playerY - barY0) / barH;
    const pdotY = barY0 + Math.max(0, Math.min(1, playerFrac)) * barH;
    const pshape = SHAPES[shapeIdx];
    glow(SCOL[pshape], 14);
    ctx.fillStyle = SCOL[pshape];
    ctx.beginPath(); ctx.arc(barX, pdotY, 5, 0, Math.PI*2); ctx.fill();
    noGlow();

    // Label
    ctx.save();
    ctx.translate(barX + 2, H/2);
    ctx.rotate(Math.PI/2);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = '9px Orbitron, monospace'; ctx.fillStyle = '#334455';
    ctx.fillText('ZONE', 0, 0);
    ctx.restore();
  }

  /* ══════════════ START SCREEN ══════════════ */
  function drawStart() {
    drawBg();
    const cx = W/2, cy = H/2;
    const si = Math.floor(frameCount * 0.011) % 3;
    const shape = SHAPES[si];
    const rot = shape === 'circle' ? 0 : frameCount * ROT_SPD[shape];
    const pulse = 1 + 0.06 * Math.sin(frameCount * 0.06);

    ctx.save();
    ctx.translate(cx, cy - H*0.16);
    ctx.scale(pulse, pulse);
    ctx.translate(-cx, -(cy - H*0.16));
    fillShape(shape, cx, cy - H*0.16, 92, SCOL[shape], SGLOW[shape], 52, rot);
    ctx.restore();

    for (let i = 0; i < 3; i++) {
      const rad = 62 + i*30 + 9*Math.sin(frameCount*0.02 + i);
      ctx.beginPath(); ctx.arc(cx, cy - H*0.16, rad, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(100,0,255,${0.08 - i*0.022})`; ctx.lineWidth = 2; ctx.stroke();
    }

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const ty = cy + H*0.07;
    ctx.font = 'bold 46px Orbitron, monospace';
    glow('#00f5ff', 36); ctx.fillStyle = '#00f5ff';
    ctx.fillText('NEON DASH', cx, ty); noGlow();

    ctx.font = 'bold 24px Orbitron, monospace';
    glow('#ff00ff', 22); ctx.fillStyle = '#ff00ff';
    ctx.fillText('SHAPE SHIFT', cx, ty + 52); noGlow();

    if (Math.floor(frameCount/30) % 2 === 0) {
      ctx.font = '17px Orbitron, monospace';
      glow('#aabbff', 10); ctx.fillStyle = '#99aacc';
      ctx.fillText('▶  TAP / SPACE TO START  ◀', cx, ty + 108); noGlow();
    }

    ctx.font = '13px Orbitron, monospace'; ctx.fillStyle = '#445566';
    ctx.fillText('BEST: ' + String(best).padStart(5,'0'), cx, ty + 152);

    ctx.font = '11px Orbitron, monospace'; ctx.fillStyle = '#334455';
    ctx.fillText('TAP TO CYCLE SHAPE  ·  ALIGN TO HOLE ZONE  ·  MATCH THE SHAPE', cx, ty + 190);

    const legY = ty + 228;
    const labels = ['CIRCLE','TRIANGLE','SQUARE'];
    SHAPES.forEach((s, i) => {
      const lx = cx + (i-1)*110;
      const lr = s === 'circle' ? 0 : frameCount * ROT_SPD[s];
      fillShape(s, lx, legY, 30, SCOL[s], SGLOW[s], 14, lr);
      ctx.font = '9px Orbitron, monospace'; ctx.fillStyle = SCOL[s];
      ctx.fillText(labels[i], lx, legY + 26);
    });
  }

  /* ══════════════ GAME SCREEN ══════════════ */
  function drawGame() {
    drawBg();
    drawZoneLines();
    walls.forEach(drawWall);
    drawParticles();
    drawPlayer();
    drawHUD();
  }

  // Subtle horizontal zone guide lines
  function drawZoneLines() {
    for (let z = 0; z < 3; z++) {
      const zy = HOLE_ZONES[z] * H;
      const nw = getNextUnpassed();
      const active = nw && nw.holeZone === z;
      ctx.strokeStyle = active ? SCOL[nw.holeShape] + '18' : 'rgba(255,255,255,0.03)';
      ctx.lineWidth   = active ? 1.5 : 1;
      ctx.setLineDash(active ? [8,16] : [4,20]);
      ctx.beginPath(); ctx.moveTo(0, zy); ctx.lineTo(W, zy); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  /* ══════════════ GAME OVER ══════════════ */
  function drawDead() {
    drawBg();
    walls.forEach(drawWall);
    drawParticles();

    ctx.fillStyle = 'rgba(8,4,22,0.84)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const cx = W/2, cy = H/2;

    ctx.font = 'bold 52px Orbitron, monospace';
    glow('#ff2200', 48); ctx.fillStyle = '#ff4422';
    ctx.fillText('GAME OVER', cx, cy - H*0.22); noGlow();

    ctx.font = 'bold 42px Orbitron, monospace';
    glow('#ffffff', 18); ctx.fillStyle = '#ffffff';
    ctx.fillText(String(score).padStart(5,'0'), cx, cy - H*0.1); noGlow();

    ctx.font = '14px Orbitron, monospace'; ctx.fillStyle = '#445566';
    ctx.fillText('BEST: ' + String(best).padStart(5,'0'), cx, cy - H*0.03);

    ctx.font = '12px Orbitron, monospace'; ctx.fillStyle = '#334455';
    ctx.fillText('LVL ' + level + '  ·  WALLS ' + wallsCleared + '  ·  SPD ×' + level.toFixed(1), cx, cy + H*0.03);

    const bw = 250, bh = 58, bx = cx - bw/2;
    const by1 = cy + H*0.1;
    drawBtn(bx, by1, bw, bh, '#00f5ff', '#001833', 'PLAY AGAIN');
    btnPlay = { x:bx, y:by1, w:bw, h:bh };

    const by2 = cy + H*0.22;
    if (!continueUsed) {
      drawBtn(bx, by2, bw, bh, '#ffcc00', '#221800', 'CONTINUE?  (WATCH AD)');
      btnContinue = { x:bx, y:by2, w:bw, h:bh };
    } else {
      ctx.font = '12px Orbitron, monospace'; ctx.fillStyle = '#334455';
      ctx.fillText('CONTINUE ALREADY USED', cx, by2 + bh/2);
      btnContinue = null;
    }
  }

  function drawBtn(x, y, w, h, col, bg, label) {
    const gr = ctx.createLinearGradient(x, y, x, y+h);
    gr.addColorStop(0, bg); gr.addColorStop(1, BG);
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.roundRect(x, y, w, h, 12); ctx.fill();
    glow(col, 20); ctx.strokeStyle = col; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(x+1, y+1, w-2, h-2, 11); ctx.stroke(); noGlow();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold 14px Orbitron, monospace';
    glow(col, 12); ctx.fillStyle = col;
    ctx.fillText(label, x+w/2, y+h/2); noGlow();
  }

  function inRect(mx, my, r) { return mx>=r.x && mx<=r.x+r.w && my>=r.y && my<=r.y+r.h; }

  /* ══════════════ INPUT ══════════════ */
  function handleTap(mx, my) {
    if (state === 'start') { state = 'playing'; initGame(); return; }
    if (state === 'dead') {
      if (btnPlay && inRect(mx, my, btnPlay))                         { state='playing'; initGame(); }
      else if (btnContinue && !continueUsed && inRect(mx,my,btnContinue)) {
        continueUsed = true; particles = []; playerFlash = 0;
        walls = walls.filter(w => !w.passed); state = 'playing';
      }
      return;
    }
    if (state === 'playing') { shapeIdx = (shapeIdx+1) % 3; combo = 0; }
  }

  canvas.addEventListener('pointerdown', e => { e.preventDefault(); handleTap(e.clientX, e.clientY); });

  window.addEventListener('keydown', e => {
    if (['Space','ArrowUp','KeyW'].includes(e.code)) {
      e.preventDefault();
      handleTap(W/2, H/2);
    }
  });

  /* ══════════════ MAIN LOOP ══════════════ */
  function update() {
    frameCount++;

    // Live player Y  — computed from sine bob
    playerY = H/2 + Math.sin(frameCount * BOB_FREQ) * (H * BOB_AMP);

    // Shape rotation
    playerRot += ROT_SPD[SHAPES[shapeIdx]];

    if (state !== 'playing') { updateParticles(); return; }

    // Spawn walls
    nextWallTimer++;
    if (nextWallTimer >= wallInterval) {
      nextWallTimer = 0;
      wallInterval  = Math.max(IVMIN, IVBASE - (level-1) * 4);
      spawnWall();
    }

    const spd = wallSpeed();
    for (let i = walls.length-1; i >= 0; i--) {
      walls[i].x -= spd;
      if (walls[i].x < -WALL_W - 20) walls.splice(i, 1);
    }

    checkCollisions();
    updateParticles();
  }

  function loop(ts) {
    lastTime = ts;
    update();
    if      (state === 'start')   drawStart();
    else if (state === 'playing') drawGame();
    else                          drawDead();
    requestAnimationFrame(loop);
  }

  requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });

})();
</script>
</body>
</html>
