kind = "web"
previewPath = "/"
title = "Neon Dash: Shape Shift"
version = "1.0.0"
id = "artifacts/neon-dash"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23353

[services.development]
run = "pnpm --filter @workspace/neon-dash run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neon-dash", "run", "build" ]
publicDir = "artifacts/neon-dash/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23353"
BASE_PATH = "/"
