<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Neon Dash: Shape Shift</title>
  <meta name="description" content="A hyper-casual neon browser game — cycle your shape to match the wall cutout!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a1a;
      overflow: hidden;
      font-family: 'Orbitron', monospace;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #wrap { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    @keyframes screenShake {
      0%   { transform: translate(0,0) rotate(0deg); }
      10%  { transform: translate(-13px,-8px) rotate(-0.8deg); }
      20%  { transform: translate(13px,9px) rotate(0.8deg); }
      30%  { transform: translate(-10px,7px) rotate(-0.6deg); }
      40%  { transform: translate(10px,-7px) rotate(0.6deg); }
      50%  { transform: translate(-8px,9px) rotate(-0.4deg); }
      60%  { transform: translate(8px,-9px) rotate(0.4deg); }
      70%  { transform: translate(-13px,5px) rotate(-0.2deg); }
      80%  { transform: translate(13px,-5px) rotate(0.2deg); }
      90%  { transform: translate(-7px,7px) rotate(-0.1deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    .shaking { animation: screenShake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

    /* Click hint overlays */
    #lhint, #rhint {
      position: fixed; top: 0; height: 100%;
      width: 50%; pointer-events: none;
      display: flex; align-items: flex-end; padding-bottom: 22px;
      opacity: 0; transition: opacity 0.15s;
    }
    #lhint { left: 0;  justify-content: flex-start; padding-left: 18px; }
    #rhint { right: 0; justify-content: flex-end;  padding-right: 18px; }
    #lhint span, #rhint span {
      font-family: 'Orbitron', monospace;
      font-size: 11px; color: #445577; letter-spacing: 0.08em;
    }
    body:not(.playing) #lhint, body:not(.playing) #rhint { display: none; }
  </style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="lhint"><span>◀ LEFT CLICK  PREV</span></div>
  <div id="rhint"><span>NEXT  RIGHT CLICK ▶</span></div>
</div>
<script>
(function () {
  'use strict';

  /* ══════════════ CANVAS ══════════════ */
  const wrap   = document.getElementById('wrap');
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  let W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  /* ══════════════ SHAPES ══════════════ */
  // 6 shapes — ordered for cycling
  const SHAPES = ['circle','triangle','square','diamond','pentagon','star','hexagon','cross','arrow','lightning','heart'];
  const SCOL = {
    circle:    '#00f5ff',
    triangle:  '#ff00ff',
    square:    '#aaff00',
    diamond:   '#ff6600',
    pentagon:  '#00ffaa',
    star:      '#ffdd00',
    hexagon:   '#bb44ff',
    cross:     '#00ffdd',
    arrow:     '#ff8833',
    lightning: '#ffff33',
    heart:     '#ff1177',
  };
  const SGLOW = {
    circle:    '#007aff',
    triangle:  '#cc00cc',
    square:    '#77cc00',
    diamond:   '#cc3300',
    pentagon:  '#00cc77',
    star:      '#ccaa00',
    hexagon:   '#8800dd',
    cross:     '#00aa88',
    arrow:     '#cc5500',
    lightning: '#aaaa00',
    heart:     '#cc0055',
  };
  // Spin speed (rad/frame). Circle=0, others vary
  const ROT_SPD = {
    circle:    0,
    triangle:  0.055,
    square:    0.034,
    diamond:   0.046,
    pentagon:  0.028,
    star:      0.068,
    hexagon:   0.022,
    cross:     0.050,
    arrow:     0.040,
    lightning: 0.030,
    heart:     0.018,
  };
  const SHAPE_LABELS = {
    circle: 'CIRCLE', triangle: 'TRIANGLE', square: 'SQUARE',
    diamond: 'DIAMOND', pentagon: 'PENTAGON', star: 'STAR',
    hexagon: 'HEXAGON', cross: 'CROSS', arrow: 'ARROW',
    lightning: 'LIGHTNING', heart: 'HEART',
  };

  /* ══════════════ CONSTANTS ══════════════ */
  const BG        = '#0a0a1a';
  const PX_PCT    = 0.18;
  const WALL_W    = 72;
  const BASE_SPD  = 5.2;
  const SPD_INC   = 0.65;
  const WALLS_LVL = 5;
  const COMBO_MIN = 5;
  const IVBASE    = 95;
  const IVMIN     = 32;
  const BOB_AMP   = 0.25;
  const BOB_FREQ  = 0.048;
  const HOLE_ZONES = [0.28, 0.50, 0.72];
  function holeSize()  { return Math.max(95, 132 - (level - 1) * 3); }
  function numShapes() { return Math.min(SHAPES.length, 3 + Math.floor((level - 1) / 2)); }

  /* ══════════════ STATE ══════════════ */
  let state = 'start';
  let score = 0, best = 0, combo = 0, shapeIdx = 0;
  let wallsCleared = 0, level = 1;
  let playerY = 0, playerRot = 0, baseY = 0;
  let targetZone = 1;          // 0 = top, 1 = mid, 2 = bot
  let touchStartX = 0, touchStartY = 0;
  const TRAIL_LEN  = 32;
  const trailY     = new Float32Array(TRAIL_LEN);
  let   trailHead  = 0;
  let playerFlash = 0, playerFlashCol = '#00ff88';
  let walls = [], particles = [], stars = [];
  let nextWallTimer = 0, wallInterval = IVBASE;
  let frameCount = 0, lastTime = 0;
  let continueUsed = false;
  let comboShowUntil = 0, successFlashUntil = 0;
  let btnPlay = null, btnContinue = null, btnMute = null, btnGuide = null, btnGuideBack = null, btnSkipAd = null;
  const AD_DURATION   = 300; // frames (~5 s at 60 fps)
  const AD_SKIP_AFTER = 180; // frames (~3 s)
  let adTimer = 0;

  try { best = parseInt(localStorage.getItem('nds_best')) || 0; } catch(_) {}

  /* ══════════════ AUDIO ENGINE ══════════════ */
  const Snd = (function () {
    let ac = null, master = null;
    let muted = false;
    // Music state
    let musicOn = false, nextBeat = 0, beatIdx = 0, schedId = null;
    const BPM       = 128;
    const HALF      = (60 / BPM) / 2;   // 8th-note duration
    const LOOKAHEAD = 0.1;
    const TICK_MS   = 50;

    // Pre-cached noise buffers — avoids per-call AudioBuffer allocation
    const NOISE_POOL = 8;
    let noisePool = null, noiseIdx = 0;
    function buildNoisePool() {
      noisePool = [];
      const len = Math.ceil(ac.sampleRate * 0.32); // longest noise we need (~0.2s snare)
      for (let i = 0; i < NOISE_POOL; i++) {
        const buf  = ac.createBuffer(1, len, ac.sampleRate);
        const data = buf.getChannelData(0);
        for (let j = 0; j < len; j++) data[j] = Math.random() * 2 - 1;
        noisePool.push(buf);
      }
    }

    function init() {
      if (ac) return;
      ac = new (window.AudioContext || window.webkitAudioContext)();
      master = ac.createGain();
      master.gain.value = 1;
      master.connect(ac.destination);
      buildNoisePool();
    }
    function resume() { if (ac && ac.state === 'suspended') ac.resume(); }

    // ── Primitives ──
    function osc(freq, type, t, dur, vol, freqEnd) {
      if (!ac) return;
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(master);
      o.type = type || 'sine';
      o.frequency.setValueAtTime(freq, t);
      if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, t + dur);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t); o.stop(t + dur + 0.02);
    }

    function noise(t, dur, vol, lpHz, lpEnd) {
      if (!ac || !noisePool) return;
      const src  = ac.createBufferSource();
      src.buffer = noisePool[noiseIdx++ % NOISE_POOL]; // reuse cached buffer
      const filt = ac.createBiquadFilter();
      filt.type  = 'lowpass';
      filt.frequency.setValueAtTime(lpHz, t);
      if (lpEnd) filt.frequency.exponentialRampToValueAtTime(lpEnd, t + dur);
      const g = ac.createGain();
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      src.connect(filt); filt.connect(g); g.connect(master);
      src.start(t); src.stop(t + dur + 0.05);
    }

    // ── SFX ──
    let lastCycleT = 0;
    function cycle(forward) {
      if (!ac) return;
      const t = ac.currentTime;
      if (t - lastCycleT < 0.08) return; // debounce rapid firing
      lastCycleT = t;
      const f = forward ? 660 : 440;
      osc(f,         'sine', t,       0.07, 0.18);
      osc(f * (forward ? 1.5 : 0.67), 'sine', t + 0.04, 0.05, 0.09);
    }

    function success() {
      if (!ac) return;
      const t = ac.currentTime;
      [523, 659, 784, 1047].forEach((f, i) => {
        osc(f,     'sine',     t + i * 0.055, 0.14, 0.26 - i * 0.04);
        osc(f * 2, 'triangle', t + i * 0.055, 0.06, 0.07);
      });
    }

    function fail() {
      if (!ac) return;
      const t = ac.currentTime;
      // Boom — pitched sweep down
      osc(130, 'sine',     t,       0.30, 0.7, 28);
      osc(180, 'sawtooth', t,       0.38, 0.35);
      osc(120, 'sawtooth', t + 0.08, 0.32, 0.28);
      osc(80,  'sawtooth', t + 0.18, 0.28, 0.22);
      // Noise crunch
      noise(t, 0.55, 0.55, 1400, 70);
    }

    function levelUp() {
      if (!ac) return;
      const t = ac.currentTime;
      [392, 523, 659, 784, 1047].forEach((f, i) => {
        osc(f, 'square', t + i * 0.07, 0.13, 0.2 - i * 0.02);
      });
      [784, 988, 1175].forEach(f => osc(f, 'triangle', t + 0.40, 0.2, 0.16));
    }

    function combo() {
      if (!ac) return;
      const t = ac.currentTime;
      [880, 1108, 1320, 1760, 2093].forEach((f, i) =>
        osc(f, 'triangle', t + i * 0.038, 0.11, 0.28 - i * 0.05));
    }

    // ── Background Music (8-step sequencer, A minor) ──
    const BASS  = [110, 110, 146.83, 110, 130.81, 110, 98, 110];
    const LEAD  = [0, 220, 0, 330, 0, 440, 330, 0];

    function scheduleTick() {
      if (!ac || !musicOn) return;
      while (nextBeat < ac.currentTime + LOOKAHEAD) {
        const t    = nextBeat;
        const step = beatIdx % 8;

        // Kick on steps 0 & 4
        if (step === 0 || step === 4) osc(110, 'sine', t, 0.22, 0.5, 32);

        // Closed hi-hat every step
        noise(t, 0.04, 0.1, 9000, 5000);

        // Open hi-hat on step 6
        if (step === 6) noise(t, 0.18, 0.13, 11000, 3000);

        // Snare on steps 2 & 6
        if (step === 2 || step === 6) {
          noise(t, 0.14, 0.28, 2500, 200);
          osc(220, 'sine', t, 0.06, 0.15);
        }

        // Bass (quarter notes: even steps)
        if (step % 2 === 0) {
          osc(BASS[step],     'sawtooth', t, HALF * 1.7, 0.22);
          osc(BASS[step] * 2, 'sine',     t, HALF * 1.3, 0.07);
        }

        // Lead
        const lf = LEAD[step];
        if (lf) {
          osc(lf,     'triangle', t, HALF * 0.8, 0.11);
          osc(lf * 2, 'sine',     t, HALF * 0.4, 0.04);
        }

        nextBeat += HALF;
        beatIdx++;
      }
    }

    function startMusic() {
      if (!ac || musicOn) return;
      musicOn = true;
      nextBeat = ac.currentTime + 0.08;
      beatIdx  = 0;
      schedId  = setInterval(scheduleTick, TICK_MS);
    }

    function stopMusic() {
      musicOn = false;
      if (schedId) { clearInterval(schedId); schedId = null; }
    }

    function toggleMute() {
      muted = !muted;
      if (master) {
        master.gain.cancelScheduledValues(ac.currentTime);
        master.gain.setTargetAtTime(muted ? 0 : 1, ac.currentTime, 0.03);
      }
      return muted;
    }

    function isMuted() { return muted; }

    return { init, resume, cycle, success, fail, levelUp, combo,
             startMusic, stopMusic, toggleMute, isMuted };
  })();

  /* ══════════════ STARS ══════════════ */
  function buildStars() {
    stars = [];
    for (let i = 0; i < 140; i++)
      stars.push({ x: Math.random()*W, y: Math.random(), r: Math.random()*1.6+0.3,
                   spd: Math.random()*0.5+0.1, a: Math.random()*0.55+0.15 });
  }
  buildStars();

  /* ══════════════ INIT ══════════════ */
  function initGame() {
    score = combo = shapeIdx = wallsCleared = 0;
    level = 1; playerRot = 0; playerFlash = 0;
    playerFlashCol = SCOL.circle;
    walls = []; particles = [];
    nextWallTimer = 0; wallInterval = IVBASE;
    continueUsed = false; comboShowUntil = successFlashUntil = 0;
    frameCount = 0;
    targetZone = 1;
    baseY      = HOLE_ZONES[1] * H;
    trailY.fill(baseY);
    trailHead  = 0;
    spawnWall();
    Snd.stopMusic();
    Snd.startMusic();
  }

  /* ══════════════ WALLS ══════════════ */
  function rndShape() { return SHAPES[Math.floor(Math.random() * numShapes())]; }

  function spawnWall() {
    walls.push({
      x: W + WALL_W + 20,
      holeShape: rndShape(),
      holeZone: Math.floor(Math.random() * 3),
      holeRotation: 0,
      passed: false,
    });
  }

  function getHoleY(w) { return HOLE_ZONES[w.holeZone] * H; }
  function wallSpeed() { return BASE_SPD + (level - 1) * SPD_INC; }
  function getNextUnpassed() { for (const w of walls) if (!w.passed) return w; return null; }

  /* ══════════════ SHAPE PATHS ══════════════ */
  // Build path for shape centered at (x,y), scaled to size, with optional rotation
  function buildPath(ctx2d, shape, x, y, size, rot) {
    ctx2d.beginPath();
    const r = size / 2;
    if (shape === 'circle') {
      ctx2d.arc(x, y, r, 0, Math.PI * 2);
      return;
    }
    // For non-circle shapes apply rotation via transform
    const hasRot = rot && rot !== 0;
    if (hasRot) { ctx2d.save(); ctx2d.translate(x, y); ctx2d.rotate(rot); ctx2d.translate(-x, -y); }

    if (shape === 'triangle') {
      const h = size * 0.866;
      ctx2d.moveTo(x,              y - h*0.64);
      ctx2d.lineTo(x + size*0.5,   y + h*0.36);
      ctx2d.lineTo(x - size*0.5,   y + h*0.36);
      ctx2d.closePath();
    } else if (shape === 'square') {
      const s = size * 0.78;
      ctx2d.roundRect(x - s/2, y - s/2, s, s, 8);
    } else if (shape === 'diamond') {
      const rh = r * 1.05, rv = r * 1.05, rw = r * 0.72;
      ctx2d.moveTo(x,      y - rh);
      ctx2d.lineTo(x + rw, y);
      ctx2d.lineTo(x,      y + rv);
      ctx2d.lineTo(x - rw, y);
      ctx2d.closePath();
    } else if (shape === 'pentagon') {
      for (let k = 0; k < 5; k++) {
        const a = (Math.PI*2*k/5) - Math.PI/2;
        const px2 = x + r * Math.cos(a);
        const py2 = y + r * Math.sin(a);
        k === 0 ? ctx2d.moveTo(px2, py2) : ctx2d.lineTo(px2, py2);
      }
      ctx2d.closePath();
    } else if (shape === 'star') {
      const ro = r, ri = r * 0.42;
      for (let k = 0; k < 10; k++) {
        const a  = (Math.PI*k/5) - Math.PI/2;
        const rd = k % 2 === 0 ? ro : ri;
        const px2 = x + rd * Math.cos(a);
        const py2 = y + rd * Math.sin(a);
        k === 0 ? ctx2d.moveTo(px2, py2) : ctx2d.lineTo(px2, py2);
      }
      ctx2d.closePath();
    } else if (shape === 'hexagon') {
      for (let k = 0; k < 6; k++) {
        const a = (Math.PI * 2 * k / 6) - Math.PI / 2;
        const px2 = x + r * Math.cos(a);
        const py2 = y + r * Math.sin(a);
        k === 0 ? ctx2d.moveTo(px2, py2) : ctx2d.lineTo(px2, py2);
      }
      ctx2d.closePath();
    } else if (shape === 'cross') {
      const arm = r * 0.38, ext = r * 0.92;
      ctx2d.moveTo(x - ext, y - arm); ctx2d.lineTo(x - arm, y - arm);
      ctx2d.lineTo(x - arm, y - ext); ctx2d.lineTo(x + arm, y - ext);
      ctx2d.lineTo(x + arm, y - arm); ctx2d.lineTo(x + ext, y - arm);
      ctx2d.lineTo(x + ext, y + arm); ctx2d.lineTo(x + arm, y + arm);
      ctx2d.lineTo(x + arm, y + ext); ctx2d.lineTo(x - arm, y + ext);
      ctx2d.lineTo(x - arm, y + arm); ctx2d.lineTo(x - ext, y + arm);
      ctx2d.closePath();
    } else if (shape === 'arrow') {
      const aw = r * 0.42, tip = r * 0.95, tail = r * 0.90, notch = r * 0.40;
      ctx2d.moveTo(x + tip,    y);
      ctx2d.lineTo(x + notch,  y - aw);
      ctx2d.lineTo(x + notch,  y - aw * 0.42);
      ctx2d.lineTo(x - tail,   y - aw * 0.42);
      ctx2d.lineTo(x - tail,   y + aw * 0.42);
      ctx2d.lineTo(x + notch,  y + aw * 0.42);
      ctx2d.lineTo(x + notch,  y + aw);
      ctx2d.closePath();
    } else if (shape === 'lightning') {
      ctx2d.moveTo(x + r * 0.28,  y - r * 0.98);
      ctx2d.lineTo(x - r * 0.14,  y - r * 0.08);
      ctx2d.lineTo(x + r * 0.26,  y - r * 0.08);
      ctx2d.lineTo(x - r * 0.28,  y + r * 0.98);
      ctx2d.lineTo(x + r * 0.16,  y + r * 0.08);
      ctx2d.lineTo(x - r * 0.22,  y + r * 0.08);
      ctx2d.closePath();
    } else if (shape === 'heart') {
      const s = r * 0.88;
      ctx2d.moveTo(x, y + s * 0.82);
      ctx2d.bezierCurveTo(x - s * 1.18, y + s * 0.08, x - s * 1.38, y - s * 0.82, x - s * 0.48, y - s * 0.72);
      ctx2d.bezierCurveTo(x - s * 0.12, y - s * 1.08, x + s * 0.12, y - s * 1.08, x + s * 0.48, y - s * 0.72);
      ctx2d.bezierCurveTo(x + s * 1.38, y - s * 0.82, x + s * 1.18, y + s * 0.08, x, y + s * 0.82);
      ctx2d.closePath();
    }

    if (hasRot) ctx2d.restore();
  }

  function fillShape(shape, x, y, size, col, glowCol, glowBlur, rot) {
    buildPath(ctx, shape, x, y, size, rot);
    glow(glowCol || col, glowBlur || 0);
    ctx.fillStyle = col;
    ctx.fill();
    noGlow();
  }

  function strokeShape(shape, x, y, size, col, lw, glowCol, glowBlur, rot) {
    buildPath(ctx, shape, x, y, size, rot);
    glow(glowCol || col, glowBlur || 0);
    ctx.strokeStyle = col;
    ctx.lineWidth   = lw;
    ctx.stroke();
    noGlow();
  }

  /* ══════════════ GLOW ══════════════ */
  function glow(c, b)  { ctx.shadowColor = c; ctx.shadowBlur = b; }
  function noGlow()    { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; }

  /* ══════════════ WALL RENDERING ══════════════ */
  let _off = null, _offCtx = null;
  function ensureOff() {
    if (!_off || _off.width !== W || _off.height !== H) {
      _off = new OffscreenCanvas(W, H);
      _offCtx = _off.getContext('2d');
    }
  }

  function drawWall(w) {
    ensureOff();
    const ox  = _offCtx;
    const wx  = Math.round(w.x);
    const hy  = getHoleY(w);
    const hs  = holeSize();
    const cx  = wx + WALL_W / 2;
    const dist      = w.x - W * PX_PCT;
    const proximity = Math.max(0, 1 - dist / (W * 0.62));

    ox.clearRect(0, 0, W, H);
    ox.fillStyle = '#130825';
    ox.fillRect(wx, 0, WALL_W, H);

    // Cut axis-aligned hole (outline rotates separately for style)
    ox.globalCompositeOperation = 'destination-out';
    ox.fillStyle = 'black';
    buildPath(ox, w.holeShape, cx, hy, hs, 0);
    ox.fill();
    ox.globalCompositeOperation = 'source-over';

    glow('#7700cc', 18 + proximity * 26);
    ctx.drawImage(_off, 0, 0);
    noGlow();

    // Edge lines
    ctx.strokeStyle = '#5500aa';
    ctx.lineWidth   = 2;
    glow('#aa00ff', 12 + proximity * 10);
    ctx.strokeRect(wx + 0.5, 0, WALL_W - 1, H);
    noGlow();

    // Zone stripes
    for (let z = 0; z < 3; z++) {
      const zy = HOLE_ZONES[z] * H;
      ctx.strokeStyle = z === w.holeZone ? SCOL[w.holeShape] + '44' : '#ffffff08';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(wx, zy); ctx.lineTo(wx + WALL_W, zy); ctx.stroke();
    }

    // Spinning hole outline
    const rs = ROT_SPD[w.holeShape] * 0.7;
    w.holeRotation += rs;
    const col = SCOL[w.holeShape];
    strokeShape(w.holeShape, cx, hy, hs, col, 2.5, col, 18 + proximity * 16, w.holeRotation);

    // Approach pulse ring
    if (proximity > 0.35) {
      const pAmt = 1 + (proximity - 0.35) * 0.1 * Math.sin(frameCount * 0.28);
      ctx.save();
      ctx.translate(cx, hy); ctx.scale(pAmt, pAmt); ctx.translate(-cx, -hy);
      strokeShape(w.holeShape, cx, hy, hs, col, 1.5, col, 10, w.holeRotation);
      ctx.restore();
    }

    // Zone dot on wall edge
    glow(col, 12); ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(wx + 5, hy, 4, 0, Math.PI*2); ctx.fill(); noGlow();
  }

  /* ══════════════ PLAYER ══════════════ */
  function drawPlayer() {
    const px    = W * PX_PCT;
    const py    = playerY;
    const shape = SHAPES[shapeIdx];
    let col     = SCOL[shape];
    let glowCol = SGLOW[shape];
    let glowAmt = 35;

    if (playerFlash > 0) {
      if (playerFlash > 0.5) { col = '#ffffff'; glowCol = playerFlashCol; glowAmt = 75; }
      playerFlash = Math.max(0, playerFlash - 0.048);
    }

    const breathe = 1 + 0.04 * Math.sin(frameCount * 0.09);
    ctx.save();
    ctx.translate(px, py); ctx.scale(breathe, breathe); ctx.translate(-px, -py);

    // Ghost trail — sampled from actual position history
    for (let i = 4; i >= 1; i--) {
      const idx  = (trailHead - 1 - i * 6 + TRAIL_LEN * 100) % TRAIL_LEN;
      const prevY = trailY[idx] || playerY;
      ctx.globalAlpha = 0.09 * (5 - i);
      fillShape(shape, px - i*12, prevY, 56*(1-i*0.05), col, glowCol, 0,
                playerRot * (1 - i*0.12));
    }
    ctx.globalAlpha = 1;

    // Glow halo
    ctx.beginPath(); ctx.arc(px, py, 40, 0, Math.PI*2);
    glow(glowCol, 26); ctx.strokeStyle = col + '2a'; ctx.lineWidth = 12; ctx.stroke(); noGlow();

    // Main shape (rotating)
    fillShape(shape, px, py, 62, col, glowCol, glowAmt, playerRot);
    fillShape(shape, px, py, 46, col + 'bb', glowCol, glowAmt * 0.5, playerRot);

    ctx.restore();
  }

  /* ══════════════ SHAPE SELECTOR HUD (bottom) ══════════════ */
  function drawShapeBar() {
    const ns    = numShapes();
    const total = SHAPES.length;
    const slotW = 52, slotH = 52, gap = 8;
    const barW  = total * slotW + (total - 1) * gap;
    const barX  = W/2 - barW/2;
    const barY  = H - 80;

    for (let i = 0; i < total; i++) {
      const s      = SHAPES[i];
      const locked = i >= ns;
      const sx  = barX + i * (slotW + gap) + slotW/2;
      const sy  = barY + slotH/2;
      const sel = !locked && i === shapeIdx;
      const col = locked ? '#222233' : SCOL[s];

      ctx.globalAlpha = locked ? 0.35 : 1;

      // Slot bg
      ctx.fillStyle = sel ? SCOL[s] + '22' : 'rgba(20,0,40,0.55)';
      ctx.beginPath(); ctx.roundRect(barX + i*(slotW+gap), barY, slotW, slotH, 8); ctx.fill();

      // Border
      if (sel) { glow(SCOL[s], 16); ctx.strokeStyle = SCOL[s]; }
      else      { ctx.strokeStyle = locked ? '#1a1a2e' : '#330055'; }
      ctx.lineWidth = sel ? 2 : 1;
      ctx.beginPath(); ctx.roundRect(barX + i*(slotW+gap) + 0.5, barY + 0.5, slotW - 1, slotH - 1, 8);
      ctx.stroke(); noGlow();

      if (locked) {
        // Show lock icon
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = '18px Orbitron, monospace';
        ctx.fillStyle = '#334';
        ctx.fillText('🔒', sx, sy - 4);
        // Unlock hint
        const unlockLvl = (i - 2) * 2 + 1;
        ctx.font = '7px Orbitron, monospace';
        ctx.fillStyle = '#445';
        ctx.fillText('LVL ' + unlockLvl, sx, sy + 14);
      } else {
        // Shape icon (spinning) — skip glow on unselected to avoid shadowBlur overhead
        const rot = frameCount * ROT_SPD[s];
        const sz  = sel ? 32 : 26;
        fillShape(s, sx, sy, sz, col, SGLOW[s], sel ? 16 : 0, rot);
      }

      ctx.globalAlpha = 1;
    }

    // ◀ ▶ labels
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.font         = '9px Orbitron, monospace';
    ctx.fillStyle    = '#334466';
    ctx.fillText('◀ L-CLICK', barX - 36, barY + slotH/2);
    ctx.fillText('R-CLICK ▶', barX + barW + 36, barY + slotH/2);
  }

  /* ══════════════ PARTICLES ══════════════ */
  function burst(x, y, c1, c2, n, spd) {
    for (let i = 0; i < n; i++) {
      const ang = (Math.PI*2*i/n) + Math.random()*0.6 - 0.3;
      const s   = spd * (0.5 + Math.random()*1.3);
      particles.push({
        x, y, vx: Math.cos(ang)*s, vy: Math.sin(ang)*s - 1.2,
        life: 1, decay: 0.016 + Math.random()*0.03,
        size: 2.5 + Math.random()*5,
        col: Math.random() > 0.4 ? c1 : c2,
        star: Math.random() > 0.65
      });
    }
  }

  function updateParticles() {
    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.16; p.vx *= 0.96;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.pow(p.life, 0.55);
      glow(p.col, 14); ctx.fillStyle = p.col; ctx.beginPath();
      if (p.star) {
        const r1 = p.size*p.life, r2 = r1*0.38;
        for (let k = 0; k < 8; k++) {
          const a = (Math.PI/4)*k, r = k%2===0 ? r1 : r2;
          k===0 ? ctx.moveTo(p.x+r*Math.cos(a), p.y+r*Math.sin(a))
                : ctx.lineTo(p.x+r*Math.cos(a), p.y+r*Math.sin(a));
        }
        ctx.closePath();
      } else { ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2); }
      ctx.fill(); noGlow();
    }
    ctx.globalAlpha = 1;
  }

  /* ══════════════ COLLISION ══════════════ */
  function checkCollisions() {
    const px = W * PX_PCT;
    for (const w of walls) {
      if (w.passed) continue;
      if (Math.abs((w.x + WALL_W/2) - px) < 28) {
        w.passed = true;
        const hy     = getHoleY(w);
        const hs     = holeSize();
        const yMatch = Math.abs(playerY - hy) < hs * 0.52;
        const sMatch = SHAPES[shapeIdx] === w.holeShape;
        if (sMatch && yMatch) onSuccess(px, playerY);
        else                  onFail(px, playerY);
        break;
      }
    }
  }

  function onSuccess(x, y) {
    score++; wallsCleared++; combo++;
    if (combo === COMBO_MIN) { comboShowUntil = frameCount + 100; Snd.combo(); }
    else if (combo > COMBO_MIN)  comboShowUntil = frameCount + 100;
    playerFlash = 1; playerFlashCol = '#00ff88';
    successFlashUntil = frameCount + 7;
    burst(x, y, '#00ff88', '#00ccff', 22, 7);
    burst(x+30, y, '#aaffaa', '#ffffff', 8, 4);
    Snd.success();
    if (wallsCleared % WALLS_LVL === 0) { level++; Snd.levelUp(); }
    if (score > best) {
      best = score;
      try { localStorage.setItem('nds_best', best); } catch(_) {}
    }
  }

  function onFail(x, y) {
    burst(x, y, '#ff2200', '#ff8800', 32, 10);
    burst(x, y, '#ff5500', '#ffaa00', 16, 5);
    Snd.fail();
    Snd.stopMusic();
    document.body.classList.remove('playing');
    triggerShake(); state = 'dead';
  }

  function triggerShake() {
    wrap.classList.remove('shaking');
    void wrap.offsetWidth;
    wrap.classList.add('shaking');
    wrap.addEventListener('animationend', () => wrap.classList.remove('shaking'), { once: true });
  }

  /* ══════════════ BACKGROUND ══════════════ */
  function drawBg() {
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);

    const spd = state === 'playing' ? wallSpeed() * 0.2 : 1;
    for (const s of stars) {
      s.x -= s.spd * spd;
      if (s.x < 0) s.x = W + 10;
      ctx.globalAlpha = s.a * (0.5 + 0.5*Math.sin(frameCount*0.025 + s.y*12));
      ctx.fillStyle = '#aaccff';
      ctx.fillRect(s.x, s.y*H, s.r, s.r);
    }
    ctx.globalAlpha = 1;

    ctx.strokeStyle = 'rgba(30,0,100,0.08)';
    ctx.lineWidth   = 1;
    for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  }

  /* ══════════════ HUD ══════════════ */
  function drawHUD() {
    // Score
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.font = 'bold 36px Orbitron, monospace';
    glow('#ffffff', 22); ctx.fillStyle = '#ffffff';
    ctx.fillText(String(score).padStart(5,'0'), W/2, 14); noGlow();

    // Level
    ctx.textAlign = 'left'; ctx.font = '13px Orbitron, monospace';
    glow('#aa00ff', 10); ctx.fillStyle = '#cc44ff';
    ctx.fillText('LVL ' + level, 16, 14); noGlow();

    // Speed bar
    const fill = Math.min((level-1)/14, 1);
    ctx.fillStyle = 'rgba(30,0,60,0.7)'; ctx.fillRect(14, 36, 110, 9);
    if (fill > 0) {
      const bar = ctx.createLinearGradient(14,0,124,0);
      bar.addColorStop(0,'#6600cc'); bar.addColorStop(1,'#ff00ff');
      glow('#ff00ff',8); ctx.fillStyle = bar; ctx.fillRect(14, 36, 110*fill, 9); noGlow();
    }
    ctx.strokeStyle = '#330055'; ctx.lineWidth = 1; ctx.strokeRect(14.5,36.5,110,9);
    ctx.font = '10px Orbitron, monospace'; ctx.fillStyle = '#553366'; ctx.textAlign = 'left';
    ctx.fillText('SPD ×' + level.toFixed(1), 16, 50);

    drawPreview();
    drawZoneIndicator();
    drawMuteBtn();

    // Combo
    if (combo >= COMBO_MIN && frameCount <= comboShowUntil) {
      const alpha = Math.min(1, (comboShowUntil - frameCount) / 25);
      ctx.globalAlpha = alpha; ctx.textAlign = 'center';
      ctx.font = 'bold 24px Orbitron, monospace';
      const t = frameCount*0.15;
      const rc = `rgb(${~~(200+55*Math.sin(t))},${~~(200+55*Math.sin(t+2))},${~~(80+40*Math.sin(t+4))})`;
      glow(rc,20); ctx.fillStyle = rc;
      ctx.fillText('×'+combo+'  COMBO!', W/2, 66); noGlow(); ctx.globalAlpha = 1;
    }
  }

  function drawPreview() {
    const nw = getNextUnpassed(); if (!nw) return;
    const px = W-86, py = 14, sz = 38;
    const col = SCOL[nw.holeShape], glw = SGLOW[nw.holeShape];
    ctx.textAlign = 'right'; ctx.textBaseline = 'top';
    ctx.font = '10px Orbitron, monospace'; ctx.fillStyle = '#445566';
    ctx.fillText('NEXT', W-48, py);
    const rot = frameCount * ROT_SPD[nw.holeShape];
    fillShape(nw.holeShape, px, py+sz/2+12, sz, col, glw, 18, rot);
  }

  function drawMuteBtn() {
    const size = 32, x = W - 50, y = 8;
    const muted = Snd.isMuted();
    // Bg pill
    ctx.fillStyle = muted ? 'rgba(80,0,0,0.55)' : 'rgba(0,30,60,0.55)';
    ctx.beginPath(); ctx.roundRect(x, y, size, size, 8); ctx.fill();
    // Border
    const bcol = muted ? '#ff4444' : '#0088cc';
    glow(bcol, 8); ctx.strokeStyle = bcol; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(x + 0.5, y + 0.5, size - 1, size - 1, 8); ctx.stroke(); noGlow();
    // Icon
    ctx.fillStyle = muted ? '#ff6666' : '#44aaff';
    ctx.font = '16px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(muted ? '🔇' : '🔊', x + size / 2, y + size / 2);
    btnMute = { x, y, w: size, h: size };
  }

  function drawZoneIndicator() {
    const nw = getNextUnpassed();
    const barX = W-18, barH = H*0.55, barY0 = (H-barH)/2;
    ctx.fillStyle = 'rgba(30,0,60,0.5)';
    ctx.beginPath(); ctx.roundRect(barX-4, barY0, 8, barH, 4); ctx.fill();

    for (let z = 0; z < 3; z++) {
      const zy  = HOLE_ZONES[z] * H;   // actual screen Y — matches player tracker scale
      const isTarget = (nw && nw.holeZone===z);
      const col = isTarget ? SCOL[nw.holeShape] : '#334455';
      const r   = isTarget ? 5 : 3;
      glow(col, isTarget ? 10 : 0);
      ctx.fillStyle = col; ctx.beginPath(); ctx.arc(barX, zy, r, 0, Math.PI*2); ctx.fill(); noGlow();
    }

    // Target-zone arrow (shows where player is heading)
    const tarY  = HOLE_ZONES[targetZone] * H;
    const ps    = SHAPES[shapeIdx];
    const arrowPulse = 0.6 + 0.4 * Math.sin(frameCount * 0.15);
    ctx.globalAlpha = arrowPulse;
    glow(SCOL[ps], 10); ctx.fillStyle = SCOL[ps];
    ctx.beginPath();
    ctx.moveTo(barX - 12, tarY);
    ctx.lineTo(barX - 6,  tarY - 5);
    ctx.lineTo(barX - 6,  tarY + 5);
    ctx.closePath(); ctx.fill(); noGlow();
    ctx.globalAlpha = 1;

    // Player current-position dot
    const pf    = Math.max(0, Math.min(1, (playerY - barY0) / barH));
    const pdotY = barY0 + pf * barH;
    glow(SCOL[ps], 14); ctx.fillStyle = SCOL[ps];
    ctx.beginPath(); ctx.arc(barX, pdotY, 5, 0, Math.PI*2); ctx.fill(); noGlow();
  }

  /* ══════════════ ZONE LINES ══════════════ */
  function drawZoneLines() {
    const nw = getNextUnpassed();
    for (let z = 0; z < 3; z++) {
      const zy     = HOLE_ZONES[z] * H;
      const active = nw && nw.holeZone === z;
      ctx.strokeStyle = active ? SCOL[nw.holeShape]+'18' : 'rgba(255,255,255,0.03)';
      ctx.lineWidth   = active ? 1.5 : 1;
      ctx.setLineDash(active ? [8,16] : [4,20]);
      ctx.beginPath(); ctx.moveTo(0,zy); ctx.lineTo(W,zy); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  /* ══════════════ START SCREEN ══════════════ */
  function drawStart() {
    drawBg();
    const cx = W/2, cy = H/2;
    const si = Math.floor(frameCount * 0.009) % SHAPES.length;
    const shape = SHAPES[si];
    const rot   = frameCount * ROT_SPD[shape];
    const pulse = 1 + 0.06 * Math.sin(frameCount * 0.06);

    ctx.save();
    ctx.translate(cx, cy-H*0.18); ctx.scale(pulse, pulse); ctx.translate(-cx, -(cy-H*0.18));
    fillShape(shape, cx, cy-H*0.18, 92, SCOL[shape], SGLOW[shape], 52, rot);
    ctx.restore();

    for (let i = 0; i < 3; i++) {
      const rad = 62 + i*30 + 9*Math.sin(frameCount*0.02+i);
      ctx.beginPath(); ctx.arc(cx, cy-H*0.18, rad, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(100,0,255,${0.08-i*0.022})`; ctx.lineWidth=2; ctx.stroke();
    }

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const ty = cy + H*0.05;

    ctx.font = 'bold 46px Orbitron, monospace';
    glow('#00f5ff',36); ctx.fillStyle = '#00f5ff';
    ctx.fillText('NEON DASH', cx, ty); noGlow();

    ctx.font = 'bold 24px Orbitron, monospace';
    glow('#ff00ff',22); ctx.fillStyle = '#ff00ff';
    ctx.fillText('SHAPE SHIFT', cx, ty+52); noGlow();

    if (Math.floor(frameCount/30)%2===0) {
      ctx.font='17px Orbitron, monospace'; glow('#aabbff',10); ctx.fillStyle='#99aacc';
      ctx.fillText('▶  TAP / SPACE TO START  ◀', cx, ty+108); noGlow();
    }

    ctx.font='13px Orbitron, monospace'; ctx.fillStyle='#445566';
    ctx.fillText('BEST: '+String(best).padStart(5,'0'), cx, ty+148);

    // HOW TO PLAY button
    const gbw = 190, gbh = 38, gbx = cx - gbw/2, gby = ty + 174;
    drawBtn(gbx, gby, gbw, gbh, '#aa44ff', '#0d0022', 'HOW TO PLAY');
    btnGuide = { x: gbx, y: gby, w: gbw, h: gbh };
  }

  /* ══════════════ GUIDE SCREEN ══════════════ */
  function drawGuide() {
    drawBg();
    const cx = W/2, cy = H/2;

    // Frosted panel
    ctx.fillStyle = 'rgba(6,2,18,0.92)';
    ctx.beginPath(); ctx.roundRect(cx - W*0.46, cy - H*0.47, W*0.92, H*0.94, 18); ctx.fill();
    ctx.strokeStyle = '#330066'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(cx - W*0.46 + 1, cy - H*0.47 + 1, W*0.92 - 2, H*0.94 - 2, 18); ctx.stroke();

    // Title
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold 22px Orbitron, monospace';
    glow('#aa44ff', 20); ctx.fillStyle = '#cc66ff';
    ctx.fillText('HOW TO PLAY', cx, cy - H*0.42); noGlow();

    // Divider
    ctx.strokeStyle = '#220044'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx - W*0.38, cy - H*0.38); ctx.lineTo(cx + W*0.38, cy - H*0.38); ctx.stroke();

    const lx = cx - W*0.40; // left-aligned text start
    let oy = cy - H*0.34;
    const LINE = H * 0.072;

    // ── OBJECTIVE ──
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.font = 'bold 11px Orbitron, monospace';
    glow('#00f5ff', 8); ctx.fillStyle = '#00f5ff';
    ctx.fillText('OBJECTIVE', lx, oy); noGlow();
    oy += LINE * 0.55;
    ctx.font = '11px Orbitron, monospace'; ctx.fillStyle = '#778899';
    ctx.fillText('Pass through each wall by matching TWO things:', lx, oy); oy += LINE * 0.52;
    ctx.fillStyle = '#aabbcc';
    ctx.fillText('  1.  Your SHAPE  must equal the wall\'s cutout shape', lx, oy); oy += LINE * 0.52;
    ctx.fillText('  2.  Your HEIGHT must align with the glowing zone (top / mid / bot)', lx, oy);
    oy += LINE * 0.85;

    // Divider
    ctx.strokeStyle = '#1a0033'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx - W*0.38, oy - LINE*0.2); ctx.lineTo(cx + W*0.38, oy - LINE*0.2); ctx.stroke();

    // ── CONTROLS (two columns) ──
    ctx.font = 'bold 11px Orbitron, monospace';
    glow('#ffcc00', 8); ctx.fillStyle = '#ffcc00';
    ctx.fillText('CONTROLS', lx, oy); noGlow();
    oy += LINE * 0.55;

    const col2x = cx + W * 0.04;
    const rows = [
      ['← / A / L-CLICK',        'Previous shape'],
      ['→ / D / SPACE / R-CLICK', 'Next shape'],
      ['↑ / W',                   'Move to zone above'],
      ['↓ / S',                   'Move to zone below'],
      ['TOUCH: swipe up / down',  'Change zone'],
      ['TOUCH: tap left / right', 'Change shape'],
      ['M',                       'Mute / unmute music'],
      ['ESC',                     'Back to menu'],
    ];
    rows.forEach(([key, desc]) => {
      ctx.font = 'bold 10px Orbitron, monospace';
      glow('#ffaa00', 6); ctx.fillStyle = '#ffcc55';
      ctx.textAlign = 'right'; ctx.fillText(key, col2x - 10, oy); noGlow();
      ctx.font = '10px Orbitron, monospace'; ctx.fillStyle = '#778899';
      ctx.textAlign = 'left'; ctx.fillText('— ' + desc, col2x + 4, oy);
      oy += LINE * 0.52;
    });
    oy += LINE * 0.35;

    // Divider
    ctx.strokeStyle = '#1a0033'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx - W*0.38, oy - LINE*0.2); ctx.lineTo(cx + W*0.38, oy - LINE*0.2); ctx.stroke();

    // ── ZONES ──
    ctx.textAlign = 'left'; ctx.font = 'bold 11px Orbitron, monospace';
    glow('#00ff88', 8); ctx.fillStyle = '#00ff88';
    ctx.fillText('ZONES', lx, oy); noGlow();
    oy += LINE * 0.55;

    const zoneLabels = ['TOP', 'MID', 'BOT'];
    const zoneColors = ['#00f5ff', '#ff00ff', '#ffcc00'];
    const zx = lx + 16;
    zoneLabels.forEach((label, i) => {
      const dotX = zx + i * W * 0.27;
      // Dot
      glow(zoneColors[i], 10); ctx.fillStyle = zoneColors[i];
      ctx.beginPath(); ctx.arc(dotX, oy, 6, 0, Math.PI*2); ctx.fill(); noGlow();
      ctx.font = 'bold 10px Orbitron, monospace'; ctx.fillStyle = zoneColors[i];
      ctx.textAlign = 'left';
      ctx.fillText(label, dotX + 12, oy);
    });
    oy += LINE * 0.48;
    ctx.font = '10px Orbitron, monospace'; ctx.fillStyle = '#556677'; ctx.textAlign = 'left';
    ctx.fillText('The glowing dot on the right edge shows the target zone.', lx, oy);
    ctx.fillText('Bob up/down naturally — just watch your height.', lx, oy + LINE*0.46);
    oy += LINE * 1.0;

    // Divider
    ctx.strokeStyle = '#1a0033'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx - W*0.38, oy - LINE*0.2); ctx.lineTo(cx + W*0.38, oy - LINE*0.2); ctx.stroke();

    // ── SHAPES ──
    ctx.textAlign = 'left'; ctx.font = 'bold 11px Orbitron, monospace';
    glow('#ff00ff', 8); ctx.fillStyle = '#ff44ff';
    ctx.fillText('SHAPES', lx, oy); noGlow();
    oy += LINE * 0.58;

    const shapeLabels = ['CIRCLE','TRI','SQUARE','DIAMOND','PENTA','STAR'];
    const step = W * 0.83 / 6;
    SHAPES.forEach((s, i) => {
      const sx = lx + step * i + step / 2;
      const rot = frameCount * ROT_SPD[s];
      fillShape(s, sx, oy, 19, SCOL[s], SGLOW[s], 9, rot);
      ctx.font = '8px Orbitron, monospace'; ctx.fillStyle = SCOL[s];
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(shapeLabels[i], sx, oy + 20);
    });
    oy += LINE * 0.85;

    // Divider
    ctx.strokeStyle = '#1a0033'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx - W*0.38, oy - LINE*0.2); ctx.lineTo(cx + W*0.38, oy - LINE*0.2); ctx.stroke();

    // ── SCORING ──
    ctx.textAlign = 'left'; ctx.font = 'bold 11px Orbitron, monospace';
    glow('#ff8800', 8); ctx.fillStyle = '#ff9922';
    ctx.fillText('SCORING', lx, oy); noGlow();
    oy += LINE * 0.55;

    const tips = [
      ['+1',            'point for every wall you clear'],
      ['×5 COMBO',      'bonus flash after 5 walls in a row without cycling'],
      ['LEVEL UP',      'every 10 walls cleared — speed and difficulty increase'],
      ['NEXT preview',  'top-right shows the upcoming wall\'s shape'],
      ['ZONE BAR',      'right edge — track your height vs the target dot'],
    ];
    tips.forEach(([label, desc]) => {
      ctx.font = 'bold 10px Orbitron, monospace';
      glow('#ff9922', 5); ctx.fillStyle = '#ffaa44';
      ctx.textAlign = 'right'; ctx.fillText(label, col2x - 10, oy); noGlow();
      ctx.font = '10px Orbitron, monospace'; ctx.fillStyle = '#667788';
      ctx.textAlign = 'left'; ctx.fillText('— ' + desc, col2x + 4, oy);
      oy += LINE * 0.5;
    });

    // BACK button
    const bbw = 160, bbh = 38, bbx = cx - bbw/2, bby = cy + H*0.43;
    drawBtn(bbx, bby, bbw, bbh, '#aa44ff', '#0d0022', '← BACK');
    btnGuideBack = { x: bbx, y: bby, w: bbw, h: bbh };
  }

  /* ══════════════ AD SCREEN ══════════════ */
  function drawAd() {
    // Blurred game behind ad
    drawBg();
    walls.forEach(drawWall);
    drawParticles();
    ctx.fillStyle = 'rgba(4,2,14,0.82)';
    ctx.fillRect(0, 0, W, H);

    const cx = W / 2, cy = H / 2;
    const progress = adTimer / AD_DURATION;
    const secsLeft = Math.ceil((AD_DURATION - adTimer) / 60);
    btnSkipAd = null;

    // ── Ad card ──
    const cw = Math.min(W * 0.78, 480), ch = Math.min(H * 0.52, 320);
    const cx0 = cx - cw / 2, cy0 = cy - ch / 2 - 18;

    ctx.fillStyle = '#0c0820';
    ctx.beginPath(); ctx.roundRect(cx0, cy0, cw, ch, 14); ctx.fill();
    ctx.strokeStyle = '#2a1060'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(cx0 + 0.5, cy0 + 0.5, cw - 1, ch - 1, 14); ctx.stroke();

    // Ad label badge
    ctx.fillStyle = '#1a0840';
    ctx.beginPath(); ctx.roundRect(cx0 + 10, cy0 + 10, 60, 18, 4); ctx.fill();
    ctx.font = 'bold 9px Orbitron, monospace'; ctx.fillStyle = '#886699';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('AD', cx0 + 18, cy0 + 19);

    // Animated neon logo placeholder (pulsing rings)
    const lcy = cy0 + ch * 0.42;
    const pulse = 1 + 0.05 * Math.sin(frameCount * 0.08);
    for (let r = 0; r < 3; r++) {
      const rad = (28 + r * 18) * pulse;
      const alpha = 0.18 - r * 0.04;
      ctx.beginPath(); ctx.arc(cx, lcy, rad, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(120,0,255,${alpha})`; ctx.lineWidth = 2; ctx.stroke();
    }
    const iconRot = frameCount * 0.025;
    fillShape('star', cx, lcy, 26, '#bb44ff', '#9900ff', 14, iconRot);

    // Sponsor name
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold 17px Orbitron, monospace';
    glow('#cc66ff', 14); ctx.fillStyle = '#cc66ff';
    ctx.fillText('NEON ADS NETWORK', cx, lcy + 44); noGlow();

    ctx.font = '10px Orbitron, monospace'; ctx.fillStyle = '#554466';
    ctx.fillText('Your ad could appear here', cx, lcy + 64);

    // Tagline
    ctx.font = 'italic 11px serif'; ctx.fillStyle = '#443355';
    ctx.fillText('"Power up your game with Neon Ads"', cx, cy0 + ch - 22);

    // ── Progress bar (bottom of card) ──
    const bary = cy0 + ch - 7, barw = cw - 20, barx = cx0 + 10;
    ctx.fillStyle = '#110030';
    ctx.beginPath(); ctx.roundRect(barx, bary, barw, 5, 3); ctx.fill();
    const fg = ctx.createLinearGradient(barx, 0, barx + barw, 0);
    fg.addColorStop(0, '#6600cc'); fg.addColorStop(1, '#ff00ff');
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.roundRect(barx, bary, barw * progress, 5, 3); ctx.fill();

    // ── Countdown circle (top-right corner) ──
    const ccx = cx0 + cw - 26, ccy = cy0 + 22, cr = 16;
    ctx.beginPath(); ctx.arc(ccx, ccy, cr, -Math.PI/2, -Math.PI/2 + Math.PI*2*progress);
    ctx.strokeStyle = '#ff00ff'; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.font = 'bold 12px Orbitron, monospace'; ctx.fillStyle = '#cc66ff';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(secsLeft, ccx, ccy);

    // ── SKIP button (appears after AD_SKIP_AFTER frames) ──
    const canSkip = adTimer >= AD_SKIP_AFTER;
    const skipW = 140, skipH = 36, skipX = cx - skipW / 2, skipY = cy0 + ch + 18;
    if (canSkip) {
      drawBtn(skipX, skipY, skipW, skipH, '#00f5ff', '#001830', 'SKIP AD  ▶▶');
      btnSkipAd = { x: skipX, y: skipY, w: skipW, h: skipH };
    } else {
      const waitSecs = Math.ceil((AD_SKIP_AFTER - adTimer) / 60);
      ctx.font = '11px Orbitron, monospace'; ctx.fillStyle = '#332244';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(`Skip in ${waitSecs}…`, cx, skipY + skipH / 2);
    }

    // ── "Watching ad earns continue" reminder ──
    ctx.font = '10px Orbitron, monospace'; ctx.fillStyle = '#2a1a44';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Watch the full ad to continue your run', cx, skipY + skipH + 18);
  }

  function doAdReward() {
    continueUsed = true; particles = []; playerFlash = 0;
    walls = walls.filter(w => !w.passed);
    Snd.stopMusic(); Snd.startMusic();
    document.body.classList.add('playing');
    state = 'playing';
  }

  /* ══════════════ GAME SCREEN ══════════════ */
  function drawGame() {
    drawBg();
    drawZoneLines();
    walls.forEach(drawWall);
    drawParticles();
    drawPlayer();
    drawHUD();
    drawShapeBar();
  }

  /* ══════════════ GAME OVER ══════════════ */
  function drawDead() {
    drawBg();
    walls.forEach(drawWall);
    drawParticles();

    ctx.fillStyle = 'rgba(8,4,22,0.84)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const cx=W/2, cy=H/2;

    ctx.font='bold 52px Orbitron, monospace';
    glow('#ff2200',48); ctx.fillStyle='#ff4422';
    ctx.fillText('GAME OVER', cx, cy-H*0.22); noGlow();

    ctx.font='bold 42px Orbitron, monospace';
    glow('#ffffff',18); ctx.fillStyle='#ffffff';
    ctx.fillText(String(score).padStart(5,'0'), cx, cy-H*0.1); noGlow();

    ctx.font='14px Orbitron, monospace'; ctx.fillStyle='#445566';
    ctx.fillText('BEST: '+String(best).padStart(5,'0'), cx, cy-H*0.03);

    ctx.font='12px Orbitron, monospace'; ctx.fillStyle='#334455';
    ctx.fillText('LVL '+level+'  ·  WALLS '+wallsCleared+'  ·  SPD ×'+level.toFixed(1), cx, cy+H*0.03);

    const bw=250, bh=58, bx=cx-125;
    const by1 = cy+H*0.1;
    drawBtn(bx, by1, bw, bh, '#00f5ff', '#001833', 'PLAY AGAIN');
    btnPlay = {x:bx,y:by1,w:bw,h:bh};

    const by2 = cy+H*0.22;
    if (!continueUsed) {
      drawBtn(bx, by2, bw, bh, '#ffcc00', '#221800', 'CONTINUE?  (WATCH AD)');
      btnContinue = {x:bx,y:by2,w:bw,h:bh};
    } else {
      ctx.font='12px Orbitron, monospace'; ctx.fillStyle='#334455';
      ctx.fillText('CONTINUE ALREADY USED', cx, by2+bh/2); btnContinue=null;
    }
  }

  function drawBtn(x, y, w, h, col, bg, label) {
    const gr = ctx.createLinearGradient(x,y,x,y+h);
    gr.addColorStop(0,bg); gr.addColorStop(1,BG);
    ctx.fillStyle=gr; ctx.beginPath(); ctx.roundRect(x,y,w,h,12); ctx.fill();
    glow(col,20); ctx.strokeStyle=col; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(x+1,y+1,w-2,h-2,11); ctx.stroke(); noGlow();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold 14px Orbitron, monospace';
    glow(col,12); ctx.fillStyle=col; ctx.fillText(label,x+w/2,y+h/2); noGlow();
  }

  function inRect(mx,my,r) { return mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h; }

  /* ══════════════ INPUT ══════════════ */
  // Prevent context menu on right click
  canvas.addEventListener('contextmenu', e => e.preventDefault());
  wrap.addEventListener('contextmenu',   e => e.preventDefault());

  function cycleNext() { shapeIdx = (shapeIdx + 1) % numShapes(); combo = 0; Snd.cycle(true); }
  function cyclePrev() { shapeIdx = (shapeIdx - 1 + numShapes()) % numShapes(); combo = 0; Snd.cycle(false); }
  function zoneUp()   { if (targetZone > 0) { targetZone--; Snd.cycle(true); } }
  function zoneDown() { if (targetZone < 2) { targetZone++; Snd.cycle(false); } }

  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();

    // Bootstrap AudioContext on first gesture (browser policy)
    Snd.init();
    Snd.resume();

    // Mute button always intercepts (visible during gameplay)
    if (btnMute && inRect(e.clientX, e.clientY, btnMute)) {
      Snd.toggleMute();
      return;
    }

    if (state === 'ad') {
      if (btnSkipAd && inRect(e.clientX, e.clientY, btnSkipAd)) doAdReward();
      return;
    }

    if (state === 'guide') {
      if (btnGuideBack && inRect(e.clientX, e.clientY, btnGuideBack)) state = 'start';
      return;
    }

    if (state === 'start') {
      if (btnGuide && inRect(e.clientX, e.clientY, btnGuide)) { state = 'guide'; return; }
      state = 'playing';
      document.body.classList.add('playing');
      initGame();
      return;
    }

    if (state === 'dead') {
      if (btnPlay && inRect(e.clientX, e.clientY, btnPlay)) {
        state = 'playing'; document.body.classList.add('playing'); initGame();
      } else if (btnContinue && !continueUsed && inRect(e.clientX, e.clientY, btnContinue)) {
        adTimer = 0; state = 'ad';
      }
      return;
    }

    if (state === 'playing') {
      if (e.pointerType === 'touch') {
        // Record start position — shape cycle fires on pointerup after checking for swipe
        touchStartX = e.clientX;
        touchStartY = e.clientY;
      } else {
        // Mouse: right-click = next, left-click = prev (immediate)
        if (e.button === 2) cycleNext(); else cyclePrev();
      }
    }
  });

  canvas.addEventListener('pointerup', e => {
    if (state !== 'playing' || e.pointerType !== 'touch') return;
    const dx = e.clientX - touchStartX;
    const dy = e.clientY - touchStartY;
    if (Math.abs(dy) > 35 && Math.abs(dy) > Math.abs(dx)) {
      // Vertical swipe → change zone
      if (dy < 0) zoneUp(); else zoneDown();
    } else if (Math.abs(dx) < 50 && Math.abs(dy) < 50) {
      // Tap → change shape (left half = prev, right half = next)
      if (e.clientX > W / 2) cycleNext(); else cyclePrev();
    }
  });

  window.addEventListener('keydown', e => {
    // Mute toggle works in any state
    if (e.code === 'KeyM') { Snd.init(); Snd.resume(); Snd.toggleMute(); return; }

    // Escape: guide → start, playing → nothing (don't quit mid-game by accident)
    if (e.code === 'Escape') {
      if (state === 'guide') { state = 'start'; return; }
      return;
    }

    const fwd  = ['ArrowRight','KeyD','KeyE','Period'].includes(e.code);
    const back = ['ArrowLeft', 'KeyA','KeyQ','Comma'].includes(e.code);
    const up   = ['ArrowUp',   'KeyW','KeyI'].includes(e.code);
    const down = ['ArrowDown', 'KeyS','KeyK'].includes(e.code);
    const any  = fwd || back || up || down || e.code === 'Space';

    if (!any) return;
    e.preventDefault();

    if (state === 'guide') return;
    if (state === 'start') { state='playing'; document.body.classList.add('playing'); initGame(); return; }
    if (state === 'dead')  { state='playing'; document.body.classList.add('playing'); initGame(); return; }
    if (state === 'playing') {
      if (fwd || e.code === 'Space') cycleNext();
      else if (back) cyclePrev();
      else if (up)   zoneUp();
      else if (down) zoneDown();
    }
  });

  /* ══════════════ MAIN LOOP ══════════════ */
  function update() {
    frameCount++;
    const zoneTargetY = HOLE_ZONES[targetZone] * H;
    baseY  += (zoneTargetY - baseY) * 0.10;
    playerY = baseY + Math.sin(frameCount * BOB_FREQ) * (H * BOB_AMP * 0.18);
    playerRot += ROT_SPD[SHAPES[shapeIdx]];
    trailY[trailHead % TRAIL_LEN] = playerY;
    trailHead++;

    if (state === 'ad') {
      adTimer++;
      if (adTimer >= AD_DURATION) doAdReward();
      updateParticles(); return;
    }
    if (state !== 'playing') { updateParticles(); return; }

    nextWallTimer++;
    if (nextWallTimer >= wallInterval) {
      nextWallTimer = 0;
      wallInterval  = Math.max(IVMIN, IVBASE - (level-1)*9);
      spawnWall();
    }

    const spd = wallSpeed();
    for (let i = walls.length-1; i >= 0; i--) {
      walls[i].x -= spd;
      if (walls[i].x < -WALL_W-20) walls.splice(i,1);
    }

    checkCollisions();
    updateParticles();
  }

  function loop(ts) {
    lastTime = ts;
    update();
    if      (state === 'start')   drawStart();
    else if (state === 'guide')   drawGuide();
    else if (state === 'ad')      drawAd();
    else if (state === 'playing') drawGame();
    else                          drawDead();
    requestAnimationFrame(loop);
  }

  requestAnimationFrame(ts => { lastTime=ts; requestAnimationFrame(loop); });

})();
</script>
</body>
</html>
